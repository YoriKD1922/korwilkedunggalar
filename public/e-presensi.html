      const rekapWorkDates=[];
      if(dStart&&dEnd){
        let cur=new Date(dStart); const eD=new Date(dEnd);
        while(cur<=eD){
          const dw=cur.getDay();
          if(dw!==0&&dw!==6){
            const dd=String(cur.getDate()).padStart(2,'0'),mm=String(cur.getMonth()+1).padStart(2,'0'),yy=cur.getFullYear();
            rekapWorkDates.push(`${dd}/${mm}/${yy}`);
          }
          cur.setDate(cur.getDate()+1);
        }
      }
      
      const isTHrek=r=>!r||(r.radius&&isTidakHadir(r.radius));

      const lemaReks=[];
      for(const lem of tls){
        const emps=getEmps(lem); if(!emps.length) continue;
        const fd=getFiltered(lem);
        const datangRows=fd.filter(x=>(x['Jenis Presensi']||'').toLowerCase()==='datang');
        const rows=emps.map(e=>{
          const nm=e['Name Pegawai']||'', nip=e['Username (MP/ID)']||'-';
          const nn=normalizeName(nm);
          const myDatang=datangRows.filter(x=>normalizeName(x['Nama Pegawai']||'')===nn);
          
          const lateRows=myDatang.filter(x=>checkLateStatus(x['Waktu'],'datang')&&!isTidakHadir(x.displayRadius||x['Keterangan Radius']));
          const totalMins=lateRows.reduce((s,x)=>s+calcLateMins(x['Waktu']),0);
          
          const hadirCount=myDatang.filter(x=>!isTidakHadir(x.displayRadius||x['Keterangan Radius'])).length;
          
          const luarRadius=myDatang.filter(x=>isOutsideRadius(x.displayRadius||x['Keterangan Radius'])).length;
          
          let thDates;
          if(rekapWorkDates.length>0){
            thDates=rekapWorkDates.filter(dt=>{
              if(pswActive(nm,dt)) return false; // PSW bukan TH
              const ent=rekapGpMap.get(`${nn}|${dt}`);
              if(ent&&((ent.datang&&ent.datang.isLibur)||(ent.pulang&&ent.pulang.isLibur))) return false; // hari libur
              return isTHrek(ent?ent.datang:null);
            });
          } else {
           
            thDates=myDatang.filter(x=>isTidakHadir(x.displayRadius||x['Keterangan Radius'])).map(x=>parsePresensiDate(x['Waktu'])).filter(Boolean);
          }
          const abs=classifyAbsence(nm,thDates);
          const totalTH=abs.alpa+abs.sakitDgSurat+abs.sakitTanpaSurat+abs.ijinRes+abs.dinasLuar+abs.cutiRes;
          return{nm,nip,hadirCount,totalMins,lateCount:lateRows.length,luarRadius,totalTH,...abs};
        }).sort((a,b)=>b.totalMins-a.totalMins||b.totalTH-a.totalTH);
        const sum=k=>rows.reduce((s,r)=>s+(r[k]||0),0);
        lemaReks.push({lem,rows,
          sumTL:sum('lateCount'),sumMins:sum('totalMins'),sumLR:sum('luarRadius'),
          sumTH:sum('totalTH'),sumAlpa:sum('alpa'),
          sumSDgS:sum('sakitDgSurat'),sumSTnpS:sum('sakitTanpaSurat'),
          sumIjin:sum('ijinRes'),sumDL:sum('dinasLuar'),sumCuti:sum('cutiRes'),
        });
      }
      if(!lemaReks.length){Swal.fire('Data Kosong','Tidak ada data pegawai untuk diekspor.','info');return;}

     
      const getKategori=r=>{
        const hariTL=Math.floor(r.totalMins/450);
        
        const total=r.totalTH+hariTL;
        if(total===0&&r.lateCount===0)            return{t:'✓ Normal',            bg:[220,252,231],tc:[21,128,61]};
        if(total===0&&r.totalMins<450)            return{t:'Peringatan\nLisan',    bg:[254,249,195],tc:[133,77,14]};
        if(total>=1  &&total<=3)                  return{t:'Hukdis\nRingan I',     bg:[255,237,213],tc:[154,52,18]};
        if(total>=4  &&total<=6)                  return{t:'Hukdis\nRingan II',    bg:[254,215,170],tc:[180,40,10]};
        if(total>=7  &&total<=10)                 return{t:'Hukdis\nSedang I',     bg:[254,202,202],tc:[185,28,28]};
        if(total>=11 &&total<=13)                 return{t:'Hukdis\nSedang II',    bg:[252,165,165],tc:[153,27,27]};
        if(total>=14 &&total<=20)                 return{t:'Hukdis\nBerat I',      bg:[239,68,68],  tc:[255,255,255]};
        return                                         {t:'HUKDIS BERAT II\n(PTDH)',bg:[127,29,29], tc:[255,255,255]};
      };

     
      const doc=new jsPDF('l','mm','a4');
      const PW=doc.internal.pageSize.getWidth(), PH=doc.internal.pageSize.getHeight();
      const fmtM=m=>{const j=Math.floor(m/60),mn=m%60;return m===0?'-':(j>0?`${j}j ${mn}m`:`${mn}m`);};
      const drawPN=d=>{doc.setFontSize(7);doc.setTextColor(130);doc.text(`Hal ${d.pageNumber}`,PW-14,PH-5,{align:'right'});};

      const drawFooter=y=>{
        if(y>PH-22) return;
        
        const k1=[
          {c:[254,249,195],t:'Kuning=Terlambat'},{c:[252,165,165],t:'Merah=Alpa'},
          {c:[255,237,213],t:'Oranye=Sakit Tanpa Surat'},{c:[220,252,231],t:'Hijau=Sakit Dgn Surat'},
          {c:[219,234,254],t:'Biru=Ijin Resmi'},{c:[243,232,255],t:'Ungu=Dinas Luar'},{c:[241,245,249],t:'Abu=Cuti'},
        ];
       
        const k2=[
          {c:[220,252,231],t:'Normal'},{c:[254,249,195],t:'Pering.Lisan'},
          {c:[255,237,213],t:'Hukdis Ringan I (1-3 hr)'},{c:[254,215,170],t:'Hukdis Ringan II (4-6 hr)'},
          {c:[254,202,202],t:'Hukdis Sedang I (7-10 hr)'},{c:[252,165,165],t:'Hukdis Sedang II (11-13 hr)'},
          {c:[239,68,68],t:'Hukdis Berat I (14-20 hr)'},{c:[127,29,29],t:'PTDH (>20 hr)'},
        ];
        doc.setFontSize(5.8); doc.setFont(undefined,'bold'); doc.setTextColor(50);
        let xi=14;
        doc.text('Warna:',xi,y+2.5); xi+=12;
        doc.setFont(undefined,'normal');
        k1.forEach(it=>{doc.setFillColor(...it.c);doc.roundedRect(xi,y,2.5,2.5,0.4,0.4,'F');doc.text(it.t,xi+3.5,y+2.5);xi+=it.t.length*2.1+5;});
        xi=14; const y2=y+6;
        doc.setFont(undefined,'bold'); doc.setTextColor(50);
        doc.text('Kategori Sanksi:',xi,y2+2.5); xi+=28;
        doc.setFont(undefined,'normal');
        k2.forEach(it=>{doc.setFillColor(...it.c);doc.roundedRect(xi,y2,2.5,2.5,0.4,0.4,'F');doc.text(it.t,xi+3.5,y2+2.5);xi+=it.t.length*2.1+5;});
        doc.setFontSize(5.5); doc.setTextColor(130);
        doc.text('7,5 jam akumulasi keterlambatan = 1 hari tidak masuk. Dasar: PP No.94/2021 | PP No.53/2010 | UU ASN No.5/2014',14,y2+7);
      };

      const drawHdr=(ttl,s1,s2)=>{
        doc.setFillColor(15,50,140); doc.rect(0,0,PW,30,'F');
        doc.setFillColor(30,64,175); doc.rect(0,24,PW,6,'F');
        doc.setTextColor(255,255,255);
        doc.setFont(undefined,'bold'); doc.setFontSize(13);
        doc.text(ttl,PW/2,10,{align:'center'});
        doc.setFont(undefined,'normal'); doc.setFontSize(7.5);
        doc.text(s1,PW/2,17,{align:'center'});
        doc.text(s2,PW/2,23,{align:'center'});
      };

      let firstPage=true;
      for(const lr of lemaReks){
        if(!firstPage) doc.addPage('a4','l');
        firstPage=false;

        
        drawHdr(
          'REKAP KETERLAMBATAN & KETIDAKHADIRAN PEGAWAI',
          `Unit Kerja: ${lr.lem}   |   Periode: ${bulan}`,
          `Dasar: PP No.94/2021, PP No.53/2010 & UU ASN No.5/2014   |   Dicetak: ${tglCetak}`
        );

     
        const stats=[
          {l:'Total\nPegawai',v:lr.rows.length,c:[219,234,254],tc:[30,64,175]},
          {l:'Terlambat\n(kali)',v:lr.sumTL,c:[254,249,195],tc:[133,77,14]},
          {l:'Akum.\nTerlambat',v:fmtM(lr.sumMins),c:[255,237,213],tc:[154,52,18]},
          {l:'Total TH',v:lr.sumTH,c:[254,202,202],tc:[185,28,28]},
          {l:'Alpa',v:lr.sumAlpa,c:[252,165,165],tc:[153,27,27]},
          {l:'Sakit\nTanpa Surat',v:lr.sumSTnpS,c:[255,237,213],tc:[180,60,10]},
          {l:'Sakit\nDgn Surat',v:lr.sumSDgS,c:[220,252,231],tc:[21,128,61]},
          {l:'Ijin\nResmi',v:lr.sumIjin,c:[219,234,254],tc:[29,78,216]},
          {l:'Dinas\nLuar',v:lr.sumDL,c:[243,232,255],tc:[109,40,217]},
          {l:'Cuti',v:lr.sumCuti,c:[241,245,249],tc:[71,85,105]},
          {l:'Luar\nRadius',v:lr.sumLR,c:[254,202,202],tc:[185,28,28]},
        ];
        const bw=(PW-28)/stats.length, bh=18, by=32;
        stats.forEach((st,i)=>{
          const bx=14+i*(bw+1);
          doc.setFillColor(...st.c); doc.roundedRect(bx,by,bw,bh,1.5,1.5,'F');
          doc.setTextColor(...st.tc); doc.setFont(undefined,'bold'); doc.setFontSize(9);
          doc.text(String(st.v),bx+bw/2,by+8,{align:'center'});
          doc.setFont(undefined,'normal'); doc.setFontSize(5); doc.setTextColor(70,70,70);
          st.l.split('\n').forEach((ln,li)=>doc.text(ln,bx+bw/2,by+12+(li*2.8),{align:'center'}));
        });

        doc.setTextColor(30,41,59); doc.setFont(undefined,'bold'); doc.setFontSize(7.5);
        doc.text('DETAIL PER PEGAWAI — urutan: akumulasi terlambat terbanyak → TH terbanyak',14,54);

        // Body
        const body=lr.rows.map((r,i)=>{
          const kat=getKategori(r);
          return[
            i+1,
            r.nm,
            r.nip,
            r.hadirCount,
            {content:r.lateCount||'-',   styles:r.lateCount>0?       {fillColor:[254,249,195],textColor:[133,77,14], fontStyle:'bold'}:{}},
            {content:fmtM(r.totalMins), styles:r.totalMins>0?       {fillColor:[255,237,213],textColor:[154,52,18], fontStyle:'bold'}:{}},
            {content:r.totalTH||'-',     styles:r.totalTH>0?         {fillColor:[254,202,202],textColor:[185,28,28], fontStyle:'bold'}:{}},
            {content:r.alpa||'-',        styles:r.alpa>0?            {fillColor:[252,165,165],textColor:[153,27,27], fontStyle:'bold'}:{}},
            {content:r.sakitTanpaSurat||'-',styles:r.sakitTanpaSurat>0?{fillColor:[255,237,213],textColor:[180,60,10],fontStyle:'bold'}:{}},
            {content:r.sakitDgSurat||'-',styles:r.sakitDgSurat>0?   {fillColor:[220,252,231],textColor:[21,128,61], fontStyle:'bold'}:{}},
            {content:r.ijinRes||'-',     styles:r.ijinRes>0?         {fillColor:[219,234,254],textColor:[29,78,216], fontStyle:'bold'}:{}},
            {content:r.dinasLuar||'-',   styles:r.dinasLuar>0?       {fillColor:[243,232,255],textColor:[109,40,217],fontStyle:'bold'}:{}},
            {content:r.cutiRes||'-',     styles:r.cutiRes>0?         {fillColor:[241,245,249],textColor:[71,85,105], fontStyle:'bold'}:{}},
            {content:r.luarRadius||'-',  styles:r.luarRadius>0?      {fillColor:[254,202,202],textColor:[185,28,28], fontStyle:'bold'}:{}},
            {content:kat.t,styles:{fillColor:kat.bg,textColor:kat.tc,fontStyle:'bold',halign:'center',fontSize:6,valign:'middle'}},
          ];
        });

        const s2=k=>lr.rows.reduce((s,r)=>s+(r[k]||0),0);
        doc.autoTable({
          startY:56,
          head:[[
            {content:'No',          rowSpan:2,styles:{valign:'middle',halign:'center'}},
            {content:'Nama Pegawai',rowSpan:2,styles:{valign:'middle',halign:'center'}},
            {content:'NIP / ID',    rowSpan:2,styles:{valign:'middle',halign:'center'}},
            {content:'Hadir',       rowSpan:2,styles:{valign:'middle',halign:'center'}},
            {content:'KETERLAMBATAN',colSpan:2,styles:{halign:'center'}},
            {content:'KETIDAKHADIRAN — PP 94/2021 & UU ASN No.5/2014',colSpan:7,styles:{halign:'center'}},
            {content:'Luar\nRadius',rowSpan:2,styles:{valign:'middle',halign:'center'}},
            {content:'KATEGORI\nSANKSI',rowSpan:2,styles:{valign:'middle',halign:'center',fillColor:[15,50,140]}},
          ],[
            'Kali','Akumulasi',
            'Total\nTH','Alpa','Sakit\nTanpa\nSurat','Sakit\nDgn\nSurat','Ijin\nResmi','Dinas\nLuar','Cuti',
          ]],
          body,
          foot:[['','TOTAL','',s2('hadirCount'),
            {content:lr.sumTL||'-',styles:{fontStyle:'bold'}},
            {content:fmtM(lr.sumMins),styles:{fontStyle:'bold'}},
            {content:lr.sumTH||'-',styles:{fontStyle:'bold'}},
            {content:lr.sumAlpa||'-',styles:{fontStyle:'bold'}},
            {content:lr.sumSTnpS||'-',styles:{fontStyle:'bold'}},
            {content:lr.sumSDgS||'-',styles:{fontStyle:'bold'}},
            {content:lr.sumIjin||'-',styles:{fontStyle:'bold'}},
            {content:lr.sumDL||'-',styles:{fontStyle:'bold'}},
            {content:lr.sumCuti||'-',styles:{fontStyle:'bold'}},
            {content:lr.sumLR||'-',styles:{fontStyle:'bold'}},
            '',
          ]],
          theme:'grid',
          headStyles:{fillColor:[30,64,175],textColor:255,fontStyle:'bold',fontSize:6.5,halign:'center',valign:'middle'},
          bodyStyles:{fontSize:7,halign:'center',valign:'middle'},
          columnStyles:{1:{halign:'left',cellWidth:40},2:{cellWidth:22,fontSize:6.5},14:{cellWidth:22}},
          footStyles:{fillColor:[15,50,140],textColor:255,fontStyle:'bold',halign:'center',fontSize:7},
          didDrawPage:drawPN,
          margin:{left:14,right:14},
        });

        drawFooter(doc.lastAutoTable.finalY+3);
      }

      const n=new Date();
      doc.save(`Rekap_Keterlambatan_${(flLem||'Semua').replace(/\s/g,'_')}_${n.toISOString().slice(0,10)}.pdf`);
    }catch(err){console.error(err);Swal.fire('Error','Terjadi kesalahan saat membuat PDF: '+err.message,'error');}
  };

  const handleReset = async () => {
    const c=await Swal.fire({title:'RESET SEMUA DATA?',text:'Tidak bisa dibatalkan! Unduh laporan dulu.',icon:'warning',showCancelButton:true,confirmButtonColor:'#d33',cancelButtonColor:'#334155',confirmButtonText:'Ya, Reset'});
    if(c.isConfirmed){Swal.fire({title:'Menghapus...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});const r=await runGoogleScript('resetDataPresensi');if(r.success){Swal.fire('Terhapus','Database presensi dikosongkan.','success');refreshData();}}
  };

  const iCls="w-full border border-slate-200 px-3 py-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-400 outline-none bg-white";
  return (
    <div className="space-y-5 anim-f">
      <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100"><h3 className="font-bold text-lg text-slate-800 flex items-center gap-2"><span className="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center"><i className="fas fa-download text-blue-600 text-sm"></i></span>Monitoring &amp; Ekspor Data</h3><p className="text-xs text-slate-400 mt-1 ml-10">Filter data terlebih dahulu, lalu pilih jenis laporan.</p></div>
      <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm"><h4 className="font-bold text-sm text-slate-700 mb-4 flex items-center gap-2"><i className="fas fa-sliders-h text-indigo-400"></i>Filter Data Ekspor</h4>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div><label className="block text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-1.5">Pilih Lembaga</label><select className={iCls} value={flLem} onChange={e=>setFlLem(e.target.value)}><option value="">Semua Lembaga</option>{lembagaList.map(l=><option key={l} value={l}>{l}</option>)}</select></div>
          <div><label className="block text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-1.5">Rentang Tanggal</label><div className="flex gap-2 items-center"><input type="date" className={iCls} value={dStart} onChange={e=>setDStart(e.target.value)} /><span className="text-slate-400 text-sm">s.d.</span><input type="date" className={iCls} value={dEnd} onChange={e=>setDEnd(e.target.value)} /></div><div className="flex gap-2 mt-2"><button onClick={thisMonth} className="text-xs bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg border border-blue-100 hover:bg-blue-100 font-medium"><i className="fas fa-calendar mr-1"></i>Bulan Ini</button>{(dStart||dEnd)&&<button onClick={clearD} className="text-xs bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg hover:bg-slate-200 font-medium"><i className="fas fa-times mr-1"></i>Hapus</button>}</div></div>
        </div>
        <p className="text-[10px] text-slate-400 mt-3 flex items-center gap-1.5 bg-slate-50 px-3 py-2 rounded-lg border border-slate-100"><i className="fas fa-info-circle"></i>Filter berlaku untuk semua jenis ekspor PDF.</p>
      </div>
      {canExport ? (
        <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
          {[
            {bg:'from-blue-50 to-blue-100/40 border-blue-200',ico:'fa-print text-blue-600',bg2:'bg-blue-100',h:'Laporan PDF Detail',d:'Seluruh data presensi sesuai filter, dikelompokkan per lembaga.',fn:generateLaporanPDF,btn:'bg-blue-700 hover:bg-blue-800',bl:'UNDUH LAPORAN',bi:'fa-file-pdf'},
            {bg:'from-indigo-50 to-indigo-100/40 border-indigo-200',ico:'fa-table text-indigo-600',bg2:'bg-indigo-100',h:'Rekapitulasi PDF',d:'Ringkasan per lembaga: datang, pulang, tidak hadir, terlambat, ijin, sakit, dinas luar.',fn:exportRekapitulasiPDF,btn:'bg-indigo-600 hover:bg-indigo-700',bl:'REKAPITULASI',bi:'fa-table-list'},
            {bg:'from-teal-50 to-teal-100/40 border-teal-200',ico:'fa-calendar-week text-teal-600',bg2:'bg-teal-100',h:'Daftar Hadir Bulanan',d:'Format tabel per lembaga. Kuning=terlambat, Merah=luar radius.',fn:exportDaftarHadirRingkas,btn:'bg-teal-600 hover:bg-teal-700',bl:'DAFTAR HADIR',bi:'fa-list-ul'},
            {bg:'from-orange-50 to-orange-100/40 border-orange-200',ico:'fa-clock text-orange-500',bg2:'bg-orange-100',h:'Rekap Keterlambatan',d:'Akumulasi keterlambatan (kali & menit/jam) dan ketidakhadiran per pegawai per lembaga sesuai filter.',fn:exportRekapKeterlambatan,btn:'bg-orange-500 hover:bg-orange-600',bl:'REKAP TERLAMBAT',bi:'fa-stopwatch'},
          ].map(({bg,ico,bg2,h,d,fn,btn,bl,bi})=>(
            <div key={h} className={`bg-gradient-to-br ${bg} p-5 rounded-2xl border flex flex-col`}>
              <div className={`w-10 h-10 ${bg2} rounded-xl flex items-center justify-center mb-4`}><i className={`fas ${ico} text-sm`}></i></div>
              <h4 className="font-bold text-slate-800 text-sm mb-2">{h}</h4>
              <p className="text-xs text-slate-500 mb-5 flex-1">{d}</p>
              <button onClick={fn} className={`w-full ${btn} text-white py-3 rounded-xl font-bold text-sm shadow-md flex items-center justify-center gap-2 transition-all`}><i className={`fas ${bi}`}></i>{bl}</button>
            </div>
          ))}
        </div>
      ) : <div className="bg-slate-50 p-8 rounded-2xl border border-slate-200 text-center"><i className="fas fa-lock text-3xl text-slate-300 mb-3 block"></i><p className="text-slate-400 text-sm">Tidak memiliki akses untuk mengekspor laporan.</p></div>}
      <div className="bg-red-50 border border-red-100 rounded-2xl p-5"><div className="flex items-start gap-4"><div className="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center flex-shrink-0"><i className="fas fa-skull-crossbones text-red-600"></i></div><div className="flex-1"><h4 className="font-bold text-red-800 mb-1 text-sm">Zona Berbahaya</h4><p className="text-xs text-red-500">Menghapus semua data <strong>Presensi</strong>. Aksi ini <strong>permanen</strong>. {!isAdmin&&<span className="font-bold">* Hanya Admin.</span>}</p></div>{isAdmin?<button onClick={handleReset} className="flex-shrink-0 border-2 border-red-500 text-red-600 hover:bg-red-600 hover:text-white px-4 py-2 rounded-xl font-black text-xs transition-all flex items-center gap-2"><i className="fas fa-trash-alt"></i>RESET</button>:<button disabled className="flex-shrink-0 border-2 border-slate-300 text-slate-400 bg-slate-100 px-4 py-2 rounded-xl font-black text-xs cursor-not-allowed flex items-center gap-2"><i className="fas fa-lock"></i>RESET</button>}</div></div>
    </div>
  );
};


const ArsipData = ({ userRole, username, refreshData }) => {
  const [rStart,setRStart]=useState(''), [rEnd,setREnd]=useState('');
  const [daftar,setDaftar]=useState([]), [loading,setLoading]=useState(false), [proses,setProses]=useState(false);

  const canArsip = userRole==='Admin'||userRole==='Superuser';

  const muatDaftar = async () => {
    setLoading(true);
    try { const r = await runGoogleScript('getArsipPresensiList'); setDaftar(r||[]); }
    catch(e){ console.error(e); }
    setLoading(false);
  };
  useEffect(()=>{ if(canArsip) muatDaftar(); },[canArsip]);

  const prosesArsip = async () => {
    if(!rStart||!rEnd){ Swal.fire('Peringatan','Tanggal mulai dan tanggal akhir wajib diisi.','warning'); return; }
    if(new Date(rStart) > new Date(rEnd)){ Swal.fire('Peringatan','Tanggal mulai tidak boleh lebih besar dari tanggal akhir.','warning'); return; }
    const c = await Swal.fire({
      title:'Arsipkan Data Presensi?',
      html:`Seluruh data <b>RekapPresensi</b> pada rentang <b>${rStart}</b> s/d <b>${rEnd}</b> akan <u>dipindahkan</u> ke arsip baru sesuai rentang tanggal tersebut.<br/><br/>Setelah diarsipkan, data tersebut tidak lagi tampil di "Presensi Sekarang" pada menu Monitoring Presensi, dan hanya bisa dilihat melalui dropdown sumber data arsip.`,
      icon:'warning', showCancelButton:true, confirmButtonColor:'#4f46e5', cancelButtonColor:'#334155',
      confirmButtonText:'Ya, Arsipkan', cancelButtonText:'Batal'
    });
    if(!c.isConfirmed) return;
    setProses(true);
    const la = Swal.fire({title:'Mengarsipkan data...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});
    try {
      const r = await runGoogleScript('arsipkanDataPresensi', rStart, rEnd, username);
      la.close();
      if(r.success){
        Swal.fire({icon:'success',title:'Berhasil',text:r.message});
        setRStart(''); setREnd('');
        await muatDaftar();
        if(refreshData) refreshData();
      } else {
        Swal.fire('Gagal', r.message||'Terjadi kesalahan.', 'error');
      }
    } catch(e) {
      la.close();
      Swal.fire('Error', e.message||'Terjadi kesalahan.', 'error');
    }
    setProses(false);
  };

  const hapusArsip = async (namaSheet) => {
    const c = await Swal.fire({title:'Hapus Arsip?',html:`Sheet arsip <b>"${namaSheet}"</b> beserta seluruh datanya akan dihapus permanen.`,icon:'warning',showCancelButton:true,confirmButtonColor:'#d33',cancelButtonColor:'#334155',confirmButtonText:'Ya, Hapus'});
    if(!c.isConfirmed) return;
    const la = Swal.fire({title:'Menghapus...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});
    const r = await runGoogleScript('hapusArsipPresensi', namaSheet);
    la.close();
    if(r.success){ Swal.fire({icon:'success',title:'Terhapus',timer:1200,showConfirmButton:false}); muatDaftar(); }
    else Swal.fire('Error', r.message||'Gagal menghapus arsip.', 'error');
  };

  if(!canArsip) return <div className="bg-white p-12 rounded-2xl shadow-sm border border-slate-100 text-center"><div className="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-4"><i className="fas fa-lock text-3xl text-slate-300"></i></div><h3 className="text-lg font-bold text-slate-700">Akses Ditolak</h3><p className="text-slate-400 text-sm mt-2">Arsip Data hanya untuk Admin.</p></div>;

  const iCls = "w-full border border-slate-200 px-3 py-2.5 rounded-lg text-sm focus:ring-2 focus:ring-indigo-400 outline-none bg-white transition-shadow";
  const lCls = "block text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-1";

  return (
    <div className="space-y-4 anim-f">
      <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
        <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2"><span className="w-8 h-8 bg-slate-50 rounded-lg flex items-center justify-center"><i className="fas fa-box-archive text-indigo-600 text-sm"></i></span>Arsip Data Presensi</h3>
        <p className="text-xs text-slate-400 mt-1 ml-10">Pindahkan data RekapPresensi ke arsip berdasarkan rentang tanggal. Data yang sudah diarsipkan dapat dilihat kembali lewat dropdown "Sumber Data" pada menu Monitoring Presensi.</p>
      </div>

      <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
          <div><label className={lCls}>Tanggal Mulai</label><input type="date" className={iCls} value={rStart} onChange={e=>setRStart(e.target.value)} /></div>
          <div><label className={lCls}>Tanggal Akhir</label><input type="date" className={iCls} value={rEnd} onChange={e=>setREnd(e.target.value)} /></div>
          <button onClick={prosesArsip} disabled={proses} className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 text-white px-4 py-2.5 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all shadow-sm shadow-indigo-500/20"><i className="fas fa-archive"></i> Arsipkan Data</button>
        </div>
        <p className="text-[11px] text-slate-400 mt-3"><i className="fas fa-info-circle mr-1"></i>Nama sheet arsip otomatis dibuat sesuai rentang tanggal, misalnya <b>"01 Januari 2026 - 31 Januari 2026"</b>.</p>
      </div>

      <div className="bg-white rounded-2xl shadow-sm border border-slate-100">
        <div className="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
          <span className="font-bold text-sm text-slate-600 flex items-center gap-2"><i className="fas fa-layer-group text-indigo-400"></i> Daftar Arsip Tersimpan</span>
          <button onClick={muatDaftar} disabled={loading} className="px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg text-xs font-semibold transition-colors flex items-center gap-1.5 disabled:opacity-60"><i className={`fas fa-sync-alt ${loading?'fa-spin':''}`}></i>Refresh</button>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm text-left">
            <thead className="bg-gradient-to-r from-indigo-700 to-indigo-800 text-white text-xs">
              <tr>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider">Nama Sheet (Rentang Tanggal)</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider text-center">Jumlah Data</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider whitespace-nowrap">Terakhir Diarsipkan</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider">Oleh</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider text-center">Aksi</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {daftar.length>0 ? daftar.map((a,i)=>(
                <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                  <td className="px-4 py-3 font-semibold text-xs">{a['Nama Sheet']}</td>
                  <td className="px-4 py-3 text-center"><span className="px-2 py-0.5 rounded bg-indigo-50 text-indigo-700 text-[11px] font-bold">{a['Jumlah Data']}</span></td>
                  <td className="px-4 py-3 whitespace-nowrap text-xs text-slate-500">{fmtTs(a['Timestamp Arsip'])}</td>
                  <td className="px-4 py-3 text-xs text-slate-500">{a['Diarsipkan Oleh']||'-'}</td>
                  <td className="px-4 py-3 text-center">
                    <button onClick={()=>hapusArsip(a['Nama Sheet'])} className="w-8 h-8 bg-red-50 text-red-600 border border-red-100 rounded-lg flex items-center justify-center hover:bg-red-100 transition-colors mx-auto"><i className="fas fa-trash-alt text-xs"></i></button>
                  </td>
                </tr>
              )) : <tr><td colSpan="5" className="text-center py-14 text-slate-300"><i className="fas fa-box-open text-4xl block mb-3"></i><span className="text-sm font-medium">{loading?'Memuat data...':'Belum ada arsip data presensi'}</span></td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};


const jadwalStatusBadge = status => {
  const map = {
    'Terjadwal': 'bg-blue-100 text-blue-700 border-blue-200',
    'Aktif': 'bg-emerald-100 text-emerald-700 border-emerald-200',
    'Selesai': 'bg-slate-100 text-slate-600 border-slate-200',
    'Dibatalkan': 'bg-red-100 text-red-700 border-red-200',
  };
  return map[status] || 'bg-slate-100 text-slate-600 border-slate-200';
};

const emptyJadwalFd = () => ({ namaAcara:'', tanggalMulai:'', tanggalAkhir:'', latitude:'', longitude:'', radius:'' });

const JadwalAcara = ({ userRole, username, pegawaiData, refreshData }) => {
  const canM = userRole==='Admin'||userRole==='Superuser';
  const [list,setList]       = useState([]);
  const [loading,setLoading] = useState(false);
  const [proses,setProses]   = useState(false);
  const [modal,setModal]     = useState(false);
  const [fd,setFd]           = useState(emptyJadwalFd());
  const [selected,setSelected] = useState(new Set());
  const [flLem,setFlLem]     = useState(''), [flNama,setFlNama] = useState('');
  const [modalPegawai,setModalPegawai] = useState(null);
  const [page,setPage]       = useState(1), [rpp,setRpp] = useState(10);

  const muatDaftar = async () => {
    setLoading(true);
    try { const r = await runGoogleScript('getJadwalAcara'); setList(r||[]); }
    catch(e){ console.error(e); }
    setLoading(false);
  };
  useEffect(()=>{ if(canM) muatDaftar(); },[canM]);
  useEffect(()=>{ setPage(1); },[list.length]);

  const filteredPegawai = useMemo(()=>(pegawaiData||[]).filter(p=>
    (p['Name Lembaga']||'').toLowerCase().includes(flLem.toLowerCase()) &&
    (p['Name Pegawai']||'').toLowerCase().includes(flNama.toLowerCase())
  ),[pegawaiData,flLem,flNama]);

  const allFilteredSelected = filteredPegawai.length>0 && filteredPegawai.every(p=>selected.has(p['Username (MP/ID)']));

  const toggleSatu = uname => {
    setSelected(prev=>{ const next=new Set(prev); if(next.has(uname)) next.delete(uname); else next.add(uname); return next; });
  };
  const toggleSemuaFilter = () => {
    setSelected(prev=>{
      const next = new Set(prev);
      if (allFilteredSelected) filteredPegawai.forEach(p=>next.delete(p['Username (MP/ID)']));
      else filteredPegawai.forEach(p=>next.add(p['Username (MP/ID)']));
      return next;
    });
  };

  const ambilLokasi = () => {
    if(!navigator.geolocation){ Swal.fire('Info','Perangkat/browser tidak mendukung geolokasi.','info'); return; }
    navigator.geolocation.getCurrentPosition(
      pos => setFd(f=>({...f, latitude:String(pos.coords.latitude.toFixed(6)), longitude:String(pos.coords.longitude.toFixed(6))})),
      err => Swal.fire('Gagal','Tidak bisa mengambil lokasi: '+err.message,'error'),
      { enableHighAccuracy:true, timeout:10000 }
    );
  };

  const openAdd = () => { setFd(emptyJadwalFd()); setSelected(new Set()); setFlLem(''); setFlNama(''); setModal(true); };

  const simpan = async () => {
    if(!fd.namaAcara||!fd.tanggalMulai||!fd.tanggalAkhir){ Swal.fire('Peringatan','Nama Acara, Tanggal Mulai, dan Tanggal Akhir wajib diisi.','warning'); return; }
    if(new Date(fd.tanggalMulai) > new Date(fd.tanggalAkhir)){ Swal.fire('Peringatan','Tanggal Mulai tidak boleh lebih besar dari Tanggal Akhir.','warning'); return; }
    if(fd.latitude===''||fd.longitude===''||fd.radius===''){ Swal.fire('Peringatan','Latitude, Longitude, dan Radius wajib diisi.','warning'); return; }
    if(selected.size===0){ Swal.fire('Peringatan','Pilih minimal satu pegawai untuk jadwal ini.','warning'); return; }
    setProses(true);
    const la = Swal.fire({title:'Menyimpan jadwal...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});
    try {
      const r = await runGoogleScript('addJadwalAcara', {
        namaAcara: fd.namaAcara, tanggalMulai: fd.tanggalMulai, tanggalAkhir: fd.tanggalAkhir,
        latitude: fd.latitude, longitude: fd.longitude, radius: fd.radius,
        daftarPegawai: Array.from(selected), username
      });
      la.close();
      if(r.success){
        Swal.fire({icon:'success',title:'Berhasil',text:r.message});
        setModal(false);
        await muatDaftar();
        if(refreshData) refreshData();
      } else {
        Swal.fire('Gagal', r.message||'Terjadi kesalahan.', 'error');
      }
    } catch(e) {
      la.close();
      Swal.fire('Error', e.message||'Terjadi kesalahan.', 'error');
    }
    setProses(false);
  };

  const batalkan = async (item) => {
    const c = await Swal.fire({
      title:'Batalkan Jadwal?',
      html:`Jadwal <b>"${item['Nama Acara']}"</b> akan dibatalkan.${item['Status']==='Aktif'?' Setting lokasi/radius pegawai yang sedang aktif akan langsung dikembalikan ke default.':''}`,
      icon:'warning', showCancelButton:true, confirmButtonColor:'#d33', cancelButtonColor:'#334155',
      confirmButtonText:'Ya, Batalkan', cancelButtonText:'Tidak'
    });
    if(!c.isConfirmed) return;
    const r = await runGoogleScript('batalkanJadwalAcara', item._rowIndex, username);
    if(r.success){ Swal.fire({icon:'success',title:'Dibatalkan',timer:1200,showConfirmButton:false}); muatDaftar(); if(refreshData) refreshData(); }
    else Swal.fire('Gagal', r.message||'Gagal membatalkan.', 'error');
  };

  const hapus = async (item) => {
    const c = await Swal.fire({title:'Hapus Riwayat?',html:`Riwayat jadwal <b>"${item['Nama Acara']}"</b> akan dihapus permanen.`,icon:'warning',showCancelButton:true,confirmButtonColor:'#d33',cancelButtonColor:'#334155',confirmButtonText:'Ya, Hapus'});
    if(!c.isConfirmed) return;
    const r = await runGoogleScript('hapusJadwalAcara', item._rowIndex);
    if(r.success){ Swal.fire({icon:'success',title:'Terhapus',timer:1000,showConfirmButton:false}); muatDaftar(); }
    else Swal.fire('Error', r.message||'Gagal menghapus.', 'error');
  };

  const lihatPegawai = (item) => {
    let daftarUsername = [];
    try { daftarUsername = JSON.parse(item['Daftar Pegawai']||'[]'); } catch(e){}
    const namaMap = {};
    (pegawaiData||[]).forEach(p=>{ namaMap[p['Username (MP/ID)']] = p['Name Pegawai']; });
    setModalPegawai({ nama: item['Nama Acara'], daftar: daftarUsername.map(u=>namaMap[u]||u) });
  };

  if(!canM) return <div className="bg-white p-12 rounded-2xl shadow-sm border border-slate-100 text-center"><div className="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-4"><i className="fas fa-lock text-3xl text-slate-300"></i></div><h3 className="text-lg font-bold text-slate-700">Akses Ditolak</h3><p className="text-slate-400 text-sm mt-2">Jadwal Acara hanya untuk Admin/Superuser.</p></div>;

  const iCls = "w-full border border-slate-200 px-3 py-2.5 rounded-xl text-sm focus:ring-2 focus:ring-blue-400 outline-none bg-white transition-shadow";
  const lCls = "block text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-1.5";

  const total = list.length;
  const eff   = rpp===total?total:rpp;
  const paged = list.slice((page-1)*eff, page*eff);

  return (
    <div className="space-y-4 anim-f flex flex-col flex-1 min-h-0">
      {/* Header */}
      <div className="bg-white p-4 sm:p-5 rounded-2xl shadow-sm border border-slate-100 flex-shrink-0">
        <div className="flex flex-wrap justify-between items-center gap-3">
          <div>
            <h3 className="font-bold text-base sm:text-lg text-slate-800 flex items-center gap-2">
              <span className="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0"><i className="fas fa-calendar-days text-blue-600 text-sm"></i></span>
              Jadwal Acara
            </h3>
            <p className="text-xs text-slate-400 mt-0.5 ml-10">Atur lokasi &amp; radius presensi sementara untuk pegawai yang mengikuti kegiatan/acara di lapangan. Setting otomatis kembali ke default setelah tanggal akhir berakhir.</p>
          </div>
          <button onClick={openAdd} className="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-4 py-2.5 rounded-xl font-bold text-xs sm:text-sm flex items-center gap-2 shadow-sm transition-all">
            <i className="fas fa-plus"></i> Tambah Jadwal
          </button>
        </div>
      </div>

      {/* Tabel daftar jadwal */}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 flex-1 flex flex-col">
        <div className="px-5 py-4 border-b border-slate-100 flex items-center justify-between flex-shrink-0">
          <span className="font-bold text-sm text-slate-600 flex items-center gap-2"><i className="fas fa-layer-group text-blue-400"></i> Daftar Jadwal Acara</span>
          <button onClick={muatDaftar} disabled={loading} className="px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg text-xs font-semibold transition-colors flex items-center gap-1.5 disabled:opacity-60"><i className={`fas fa-sync-alt ${loading?'fa-spin':''}`}></i>Refresh</button>
        </div>
        <div className="overflow-x-auto flex-1">
          <table className="w-full text-sm text-left">
            <thead className="bg-gradient-to-r from-blue-700 to-blue-800 text-white text-xs">
              <tr>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider">Nama Acara</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider whitespace-nowrap">Periode</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider">Lokasi &amp; Radius</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider text-center">Pegawai</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider text-center">Status</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider text-center">Aksi</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {paged.length>0 ? paged.map((item,i)=>{
                let jumlahPegawai = 0;
                try { jumlahPegawai = (JSON.parse(item['Daftar Pegawai']||'[]')||[]).length; } catch(e){}
                return (
                  <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                    <td className="px-4 py-3 font-semibold text-xs">{item['Nama Acara']}</td>
                    <td className="px-4 py-3 text-xs text-slate-500 whitespace-nowrap">{item['Tanggal Mulai']} s/d {item['Tanggal Akhir']}</td>
                    <td className="px-4 py-3 text-xs text-slate-500 font-mono whitespace-nowrap">{item['Latitude']}, {item['Longitude']} <span className="text-slate-400">({item['Radius (m)']} m)</span></td>
                    <td className="px-4 py-3 text-center">
                      <button onClick={()=>lihatPegawai(item)} className="px-2 py-0.5 rounded bg-blue-50 text-blue-700 text-[11px] font-bold hover:bg-blue-100 transition-colors">{jumlahPegawai} pegawai</button>
                    </td>
                    <td className="px-4 py-3 text-center"><span className={`inline-block px-2 py-0.5 rounded-lg text-[9px] font-black uppercase border ${jadwalStatusBadge(item['Status'])}`}>{item['Status']}</span></td>
                    <td className="px-4 py-3">
                      <div className="flex justify-center gap-1.5">
                        {(item['Status']==='Terjadwal'||item['Status']==='Aktif') &&
                          <button onClick={()=>batalkan(item)} className="w-8 h-8 bg-amber-50 text-amber-600 border border-amber-100 rounded-lg flex items-center justify-center hover:bg-amber-100 transition-colors" title="Batalkan Jadwal"><i className="fas fa-ban text-xs"></i></button>}
                        {(item['Status']==='Selesai'||item['Status']==='Dibatalkan') &&
                          <button onClick={()=>hapus(item)} className="w-8 h-8 bg-red-50 text-red-500 border border-red-100 rounded-lg flex items-center justify-center hover:bg-red-100 transition-colors" title="Hapus Riwayat"><i className="fas fa-trash-alt text-xs"></i></button>}
                      </div>
                    </td>
                  </tr>
                );
              }) : <tr><td colSpan="6" className="text-center py-14 text-slate-300"><i className="fas fa-calendar-xmark text-4xl block mb-3"></i><span className="text-sm font-medium">{loading?'Memuat data...':'Belum ada jadwal acara'}</span></td></tr>}
            </tbody>
          </table>
        </div>
        <div className="flex-shrink-0">
          <TablePagination currentPage={page} totalItems={total} rowsPerPage={rpp} onPageChange={setPage} onRowsPerPageChange={setRpp} />
        </div>
      </div>

      {/* Modal Tambah Jadwal */}
      {modal && (
        <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={()=>setModal(false)}>
          <div className="bg-white w-full sm:rounded-2xl shadow-2xl flex flex-col modal-outer" style={{maxWidth:'760px',maxHeight:'90vh'}} onClick={e=>e.stopPropagation()}>
            <div className="flex-shrink-0 px-5 sm:px-6 py-4 sm:py-5 flex justify-between items-center bg-gradient-to-r from-blue-700 to-blue-800 text-white sm:rounded-t-2xl rounded-t-2xl">
              <span className="font-bold text-sm sm:text-base flex items-center gap-2.5"><i className="fas fa-calendar-plus text-blue-200"></i>Tambah Jadwal Acara</span>
              <button onClick={()=>setModal(false)} className="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-white/20 transition-colors text-xl font-bold leading-none">&times;</button>
            </div>
            <div className="overflow-y-auto flex-1 p-4 sm:p-6 modal-body space-y-4">
              <div>
                <label className={lCls}>Nama Acara <span className="text-red-400">*</span></label>
                <input type="text" value={fd.namaAcara} onChange={e=>setFd({...fd,namaAcara:e.target.value})} className={iCls} placeholder="Contoh: Rapat Koordinasi KKG Kecamatan Sine" />
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                <div><label className={lCls}>Tanggal Mulai <span className="text-red-400">*</span></label><input type="date" value={fd.tanggalMulai} onChange={e=>setFd({...fd,tanggalMulai:e.target.value})} className={iCls} /></div>
                <div><label className={lCls}>Tanggal Akhir <span className="text-red-400">*</span></label><input type="date" value={fd.tanggalAkhir} onChange={e=>setFd({...fd,tanggalAkhir:e.target.value})} className={iCls} /></div>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 sm:gap-4">
                <div><label className={lCls}>Latitude <span className="text-red-400">*</span></label><input type="text" value={fd.latitude} onChange={e=>setFd({...fd,latitude:e.target.value})} className={iCls+' font-mono'} placeholder="-7.xxxxx" /></div>
                <div><label className={lCls}>Longitude <span className="text-red-400">*</span></label><input type="text" value={fd.longitude} onChange={e=>setFd({...fd,longitude:e.target.value})} className={iCls+' font-mono'} placeholder="111.xxxxx" /></div>
                <div><label className={lCls}>Radius (meter) <span className="text-red-400">*</span></label><input type="number" min="0" value={fd.radius} onChange={e=>setFd({...fd,radius:e.target.value})} className={iCls} placeholder="Contoh: 100" /></div>
              </div>
              <button type="button" onClick={ambilLokasi} className="text-xs font-bold text-blue-600 hover:text-blue-700 flex items-center gap-1.5"><i className="fas fa-location-crosshairs"></i> Ambil Lokasi Saat Ini (GPS)</button>

              <div className="border-t border-slate-100 pt-4">
                <div className="flex flex-wrap items-center justify-between gap-2 mb-2">
                  <label className={lCls+' mb-0'}>Pilih Pegawai <span className="text-red-400">*</span> <span className="text-slate-400 font-normal normal-case">({selected.size} terpilih)</span></label>
                  <label className="flex items-center gap-1.5 text-[11px] font-bold text-blue-600 cursor-pointer select-none">
                    <input type="checkbox" checked={allFilteredSelected} onChange={toggleSemuaFilter} className="rounded accent-blue-600 w-3.5 h-3.5" /> Pilih Semua (sesuai filter)
                  </label>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-2">
                  <input type="text" value={flNama} onChange={e=>setFlNama(e.target.value)} className={iCls} placeholder="Cari nama pegawai..." />
                  <select value={flLem} onChange={e=>setFlLem(e.target.value)} className={iCls}>
                    <option value="">-- Semua Lembaga --</option>
                    {lembagaList.map(l=><option key={l} value={l}>{l}</option>)}
                  </select>
                </div>

            </div>

      {/* Modal Lihat Daftar Pegawai */}
      {modalPegawai && (
        <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4" onClick={()=>setModalPegawai(null)}>
          <div className="bg-white w-full rounded-2xl shadow-2xl flex flex-col" style={{maxWidth:'420px',maxHeight:'80vh'}} onClick={e=>e.stopPropagation()}>
            <div className="flex-shrink-0 px-5 py-4 flex justify-between items-center bg-gradient-to-r from-blue-700 to-blue-800 text-white rounded-t-2xl">
              <span className="font-bold text-sm flex items-center gap-2"><i className="fas fa-users text-blue-200"></i>{modalPegawai.nama}</span>
              <button onClick={()=>setModalPegawai(null)} className="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-white/20 transition-colors text-lg leading-none">&times;</button>
            </div>
            <div className="overflow-y-auto p-4 space-y-1.5">
              {modalPegawai.daftar.length>0 ? modalPegawai.daftar.map((nm,i)=>(
                <div key={i} className="flex items-center gap-2 px-3 py-2 bg-slate-50 rounded-lg text-xs font-semibold text-slate-600"><i className="fas fa-user text-slate-300 text-[10px]"></i>{nm}</div>
              )) : <div className="text-center py-8 text-slate-300 text-xs">Tidak ada pegawai</div>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};


const ActivityLog = ({ userRole }) => {
  const [logs,setLogs]=useState([]), [load,setLoad]=useState(false);
  const [flUser,setFlUser]=useState(''), [flAct,setFlAct]=useState('');
  const [dS,setDS]=useState(''), [dE,setDE]=useState('');
  const [page,setPage]=useState(1), [rpp,setRpp]=useState(10);
  const canView = userRole==='Admin';
  const fetchLogs = async()=>{ if(!canView) return; setLoad(true); const r=await runGoogleScript('getActivityLogs'); setLogs(r||[]); setLoad(false); };
  useEffect(()=>{ if(canView) fetchLogs(); },[canView]);
  useEffect(()=>{ setPage(1); setRpp(10); },[flUser,flAct,dS,dE]);
  const filtered = useMemo(()=>{
    let r=logs;
    if(flUser) r=r.filter(l=>(l.Username||'').toLowerCase().includes(flUser.toLowerCase()));
    if(flAct)  r=r.filter(l=>(l.Action||'').toLowerCase().includes(flAct.toLowerCase()));
    if(dS){ const s=new Date(dS); s.setHours(0,0,0,0); r=r.filter(l=>new Date(l.Timestamp)>=s); }
    if(dE){ const e=new Date(dE); e.setHours(23,59,59,999); r=r.filter(l=>new Date(l.Timestamp)<=e); }
    return r;
  },[logs,flUser,flAct,dS,dE]);
  const total=filtered.length, eff=rpp===total?total:rpp;
  const paged=filtered.slice((page-1)*eff, page*eff);
  if(!canView) return <div className="bg-white p-12 rounded-2xl shadow-sm border border-slate-100 text-center"><div className="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-4"><i className="fas fa-lock text-3xl text-slate-300"></i></div><h3 className="text-lg font-bold text-slate-700">Akses Ditolak</h3><p className="text-slate-400 text-sm mt-2">Log aktivitas hanya untuk Admin.</p></div>;
  return (
    <div className="space-y-4 anim-f flex flex-col flex-1 min-h-0">
      <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100"><h3 className="font-bold text-lg text-slate-800 flex items-center gap-2"><span className="w-8 h-8 bg-slate-50 rounded-lg flex items-center justify-center"><i className="fas fa-history text-blue-600 text-sm"></i></span>Log Monitoring Aktivitas</h3><p className="text-xs text-slate-400 mt-1 ml-10">Riwayat login dan aktivitas pengguna sistem.</p></div>
      <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-wrap gap-3 items-center">
        <input type="text" placeholder="Cari Username..." className="border border-slate-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400 flex-1 min-w-[120px]" value={flUser} onChange={e=>setFlUser(e.target.value)} />
        <input type="text" placeholder="Cari Aksi..." className="border border-slate-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400 flex-1 min-w-[100px]" value={flAct} onChange={e=>setFlAct(e.target.value)} />
        <input type="date" className="border border-slate-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400" value={dS} onChange={e=>setDS(e.target.value)} />
        <input type="date" className="border border-slate-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400" value={dE} onChange={e=>setDE(e.target.value)} />
        <button onClick={()=>{setFlUser('');setFlAct('');setDS('');setDE('');}} className="px-4 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg text-sm font-semibold transition-colors"><i className="fas fa-undo mr-1.5"></i>Reset</button>
        <button onClick={fetchLogs} disabled={load} className="px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-semibold transition-colors flex items-center gap-2 disabled:opacity-60"><i className={`fas fa-sync-alt ${load?'fa-spin':''}`}></i>Refresh</button>
      </div>
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 flex-1 flex flex-col">
        <div className="overflow-x-auto rounded-t-2xl flex-1">
          <table className="w-full text-sm text-left">
            <thead className="bg-gradient-to-r from-blue-700 to-blue-800 text-white text-xs">
              <tr>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider whitespace-nowrap">Tanggal &amp; Waktu</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider">Username</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider">Role</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider">Aksi</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider">Detail</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {paged.length>0 ? paged.map((log,i)=>(
                <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                  {/* ★ FIX: gunakan fmtTs() agar tanggal invalid tetap terbaca */}
                  <td className="px-4 py-3 whitespace-nowrap"><span className="text-xs font-mono bg-slate-50 border border-slate-100 px-2 py-1 rounded-md text-slate-600">{fmtTs(log.Timestamp)}</span></td>
                  <td className="px-4 py-3 font-semibold text-xs">{log.Username||'-'}</td>
                  <td className="px-4 py-3"><span className="inline-block px-2 py-0.5 rounded text-[9px] font-black uppercase bg-slate-100 text-slate-600">{log.Role||'-'}</span></td>
                  <td className="px-4 py-3"><span className={`inline-flex items-center gap-1 px-2 py-1 rounded text-[9px] font-black uppercase ${log.Action==='login'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}`}><i className={`fas ${log.Action==='login'?'fa-sign-in-alt':'fa-sign-out-alt'} text-[7px]`}></i>{log.Action||'-'}</span></td>
                  <td className="px-4 py-3 text-xs text-slate-500">{log.Details||'-'}</td>
                </tr>
              )) : <tr><td colSpan="5" className="text-center py-14 text-slate-300"><i className="fas fa-scroll text-4xl block mb-3"></i><span className="text-sm font-medium">{load?'Memuat data...':'Tidak ada log aktivitas'}</span></td></tr>}
              {paged.length>0&&Array.from({length:Math.max(0,10-paged.length)}).map((_,i)=>(
                <tr key={`filler-${i}`} className="border-transparent"><td colSpan="5" className="h-[46px] px-4"></td></tr>
              ))}
            </tbody>
          </table>
        </div>
        {total>0&&<div className="flex-shrink-0"><TablePagination currentPage={page} totalItems={total} rowsPerPage={rpp} onPageChange={setPage} onRowsPerPageChange={v=>{setRpp(v);setPage(1);}} /></div>}
      </div>
    </div>
  );
};


const PengajuanPSW = ({ user }) => {
  const [pegList,setPegList]=useState([]);
  const [fd,setFd]=useState({nip:'',jenis:'',tglAwal:'',tglAkhir:''});
  const [file,setFile]=useState(null), [load,setLoad]=useState(false);
  useEffect(()=>{ const f=async()=>{ if(!user||!user.lembaga) return; const r=await runGoogleScript('getPegawaiByLembaga',user.lembaga); setPegList(Array.isArray(r)?r:[]); }; f(); },[user]);
  const onFile=e=>{
    const f=e.target.files[0]; if(!f) return;
    if(f.type!=='application/pdf'){Swal.fire('Format Salah','Hanya PDF diizinkan.','warning');e.target.value='';return;}
    if(f.size>5*1024*1024){Swal.fire('Terlalu Besar','Maks 5MB.','warning');e.target.value='';return;}
    const r=new FileReader(); r.onload=()=>setFile({name:f.name,base64:r.result}); r.readAsDataURL(f);
  };
  const submit=async e=>{
    e.preventDefault();
    if(!file){Swal.fire('Peringatan','Lampirkan PDF.','warning');return;}
    if(!fd.nip||!fd.jenis||!fd.tglAwal||!fd.tglAkhir){Swal.fire('Peringatan','Semua field wajib diisi.','warning');return;}
    const pg=pegList.find(p=>p.nip===fd.nip); if(!pg){Swal.fire('Error','Pegawai tidak ditemukan.','error');return;}
    setLoad(true);
    const r=await runGoogleScript('submitPengajuan',{lembaga:user.lembaga,namaPegawai:pg.nama,nip:pg.nip,jenis:fd.jenis,tglAwal:fd.tglAwal,tglAkhir:fd.tglAkhir,fileName:file.name,fileBase64:file.base64});
    setLoad(false);
    if(r.success){Swal.fire({icon:'success',title:'Terkirim',text:'Pengajuan berhasil diteruskan ke Korwil.',confirmButtonColor:'#2563eb'});setFd({nip:'',jenis:'',tglAwal:'',tglAkhir:''});setFile(null);document.getElementById('fileInput').value='';}
    else Swal.fire('Gagal',r.message,'error');
  };
  return (
    <div className="anim-f">
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div className="px-6 py-5 border-b border-slate-100 bg-gradient-to-r from-blue-50 to-indigo-50 flex items-center gap-4">
          <div className="w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-md shadow-blue-500/25 flex-shrink-0"><i className="fas fa-file-upload text-white"></i></div>
          <div><h3 className="font-black text-slate-800">Form Pengajuan PSW</h3><p className="text-xs text-slate-500 mt-0.5">Lembaga: <span className="font-bold text-blue-600">{user.lembaga}</span></p></div>
        </div>
        <form onSubmit={submit} className="p-6 md:p-8 space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="md:col-span-2"><label className="block text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-2">Pilih Pegawai *</label><select required value={fd.nip} onChange={e=>setFd({...fd,nip:e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-400 outline-none"><option value="" disabled>-- Pilih Pegawai --</option>{pegList.map(p=><option key={p.nip} value={p.nip}>{p.nama} (NIP: {p.nip})</option>)}</select></div>
            <div className="md:col-span-2">
              <label className="block text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-3">Kategori Pengajuan *</label>
              <div className="grid grid-cols-3 gap-4">
                {[{v:'Sakit',ic:'fa-heartbeat',c:'rose'},{v:'Ijin',ic:'fa-envelope-open-text',c:'amber'},{v:'Dinas Luar',ic:'fa-car-side',c:'blue'}].map(({v,ic,c})=>{
                  const sel=fd.jenis===v;
                  return <label key={v} className={`cursor-pointer border-2 rounded-2xl p-4 flex flex-col items-center justify-center transition-all ${sel?`border-${c}-500 bg-${c}-50`:'border-slate-100 bg-white hover:border-slate-200 hover:bg-slate-50'}`}><input type="radio" name="jenis" value={v} className="hidden" checked={sel} onChange={e=>setFd({...fd,jenis:e.target.value})} required /><div className={`w-11 h-11 rounded-full mb-3 flex items-center justify-center text-xl ${sel?`bg-${c}-100 text-${c}-600`:'bg-slate-100 text-slate-400'}`}><i className={`fas ${ic}`}></i></div><span className={`font-bold text-sm ${sel?`text-${c}-700`:'text-slate-500'}`}>{v}</span></label>;
                })}
              </div>
            </div>
            <div><label className="block text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-2">Tanggal Mulai *</label><input type="date" required value={fd.tglAwal} onChange={e=>setFd({...fd,tglAwal:e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-400 outline-none" /></div>
            <div><label className="block text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-2">Tanggal Selesai *</label><input type="date" required min={fd.tglAwal} value={fd.tglAkhir} onChange={e=>setFd({...fd,tglAkhir:e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-400 outline-none" /></div>
            <div className="md:col-span-2">
              <label className="block text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-2">Lampiran Bukti Dukung PDF *</label>
              <div className={`border-2 border-dashed rounded-2xl p-8 flex flex-col items-center justify-center transition-all relative cursor-pointer ${file?'border-green-400 bg-green-50':'border-slate-200 bg-slate-50 hover:bg-slate-100 hover:border-slate-300'}`}>
                <input id="fileInput" type="file" accept=".pdf" onChange={onFile} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" required={!file} />
                {file ? <div className="text-center"><div className="w-14 h-14 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl"><i className="fas fa-file-check"></i></div><p className="font-bold text-slate-800 text-sm">{file.name}</p><p className="text-xs text-green-600 mt-1.5 font-medium">Siap diunggah &mdash; klik untuk mengganti</p></div>
                  : <div className="text-center"><div className="w-14 h-14 bg-blue-50 text-blue-400 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl"><i className="fas fa-cloud-upload-alt"></i></div><p className="font-bold text-slate-600 text-sm">Klik atau tarik file PDF ke sini</p><p className="text-xs text-slate-400 mt-1">Maksimal 5MB</p></div>}
              </div>
            </div>
          </div>
          <div className="pt-4 border-t border-slate-100 flex justify-end">
            <button type="submit" disabled={load} className="px-8 py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-blue-500/25 hover:opacity-90 transition-all disabled:opacity-60 flex items-center gap-2.5">
              {load?<><i className="fas fa-spinner fa-spin"></i>Memproses...</>:<><i className="fas fa-paper-plane"></i>Kirim Pengajuan</>}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
};


const App = () => {
  const [user,setUser]=useState(()=>{ try{ const s=sessionStorage.getItem('korwil_user'); return s?JSON.parse(s):null; }catch{return null;} });
  const [tab,setTab]=useState('dashboard');
  const [presensi,setPresensi]=useState([]), [ijin,setIjin]=useState([]), [pegawai,setPegawai]=useState([]);
  const [load,setLoad]=useState(false), [sideOpen,setSideOpen]=useState(false);
  const [fetchDuration,setFetchDuration]=useState(null);  // ms
  const [lastSync,setLastSync]=useState(null);             // Date

  const fmtDuration = ms => {
    if(ms===null) return null;
    if(ms<1000) return `${ms}ms`;
    const s=(ms/1000).toFixed(1);
    if(ms<60000) return `${s}dtk`;
    const m=Math.floor(ms/60000), sisa=((ms%60000)/1000).toFixed(0);
    return `${m}mnt ${sisa}dtk`;
  };
  const fmtTime = d => d?d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):null;

  const fetchData = async()=>{
    setLoad(true);
    const t0=Date.now();
    try{
      const [rP,rI,rPg]=await Promise.all([runGoogleScript('getPresensi'),runGoogleScript('getIjin'),runGoogleScript('getPegawai')]);
      setPresensi(rP||[]); setIjin(rI||[]); setPegawai(rPg||[]);
      const dur=Date.now()-t0;
      setFetchDuration(dur);
      setLastSync(new Date());
    }catch(e){console.error(e);}
    setLoad(false);
  };
  useEffect(()=>{ if(user) fetchData(); },[user]);
  const enriched = useMemo(()=>enrichPresensiWithIjin(presensi,ijin),[presensi,ijin]);

          })}
        </nav>
        {/* User — selalu terlihat di bawah, tidak ikut scroll */}
        <div className="px-4 py-4 border-t border-white/10 bg-black/20 flex-shrink-0">
          <div className="flex items-center gap-3 mb-3 px-1">
            <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-sm font-black flex-shrink-0 shadow-md">{user.nama.charAt(0)}</div>
            <div className="overflow-hidden flex-1">
              <div className="font-bold text-sm text-white truncate">{user.nama}</div>
              <span className="px-1.5 py-0.5 bg-blue-400/20 text-blue-300 rounded text-[9px] font-black uppercase border border-blue-400/20">{user.role}</span>
              {uLembaga&&<div className="text-[9px] text-blue-300/50 mt-0.5 truncate"><i className="fas fa-building mr-1"></i>{uLembaga}</div>}
            </div>
          </div>
          <button onClick={logout} className="w-full bg-red-500/10 hover:bg-red-500/20 text-red-300 hover:text-red-200 py-2.5 rounded-xl font-bold text-xs transition-all border border-red-500/20 flex items-center justify-center gap-2">
            <i className="fas fa-power-off"></i> KELUAR
          </button>
        </div>
        </div>
      </div>

      {/* Main */}
      <div className="flex-1 flex flex-col main-full overflow-hidden">
        <header className="bg-white border-b border-slate-200 px-5 md:px-7 py-4 flex justify-between items-center z-20 shadow-sm flex-shrink-0">
          <div className="flex items-center gap-3">
            <button className="md:hidden w-9 h-9 rounded-xl bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200" onClick={()=>setSideOpen(!sideOpen)}><i className="fas fa-bars text-sm"></i></button>
            <div>
              <div className="flex items-center gap-2"><span className="w-1 h-5 bg-blue-600 rounded-full"></span><h2 className="text-base font-black text-slate-800">{LABELS[tab]||tab}</h2></div>
              <p className="text-[10px] text-slate-400 ml-3 mt-0.5">{new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
            </div>
          </div>
          <div className="flex items-center gap-2 sm:gap-3">
            {/* Info jumlah data — desktop only */}
            <div className="hidden md:flex items-center gap-2 text-xs text-slate-400 bg-slate-50 px-3 py-2 rounded-xl border border-slate-200">
              <i className="fas fa-database text-slate-300"></i>
              <span>{presensi.length} data</span>
            </div>
            {/* Info durasi + waktu sync */}
            {!load&&lastSync&&(
              <div className="hidden sm:flex flex-col items-end leading-none gap-0.5">
                <span className="text-[10px] text-slate-400 flex items-center gap-1">
                  <i className="fas fa-clock text-slate-300" style={{fontSize:'9px'}}></i>
                  Sync {fmtTime(lastSync)}
                </span>
                {fetchDuration!==null&&(
                  <span className="text-[10px] font-bold text-emerald-500 flex items-center gap-1">
                    <i className="fas fa-bolt" style={{fontSize:'9px'}}></i>
                    {fmtDuration(fetchDuration)}
                  </span>
                )}
              </div>
            )}
            {load&&(
              <div className="hidden sm:flex flex-col items-end leading-none gap-0.5">
                <span className="text-[10px] text-blue-400 flex items-center gap-1 animate-pulse">
                  <i className="fas fa-spinner fa-spin" style={{fontSize:'9px'}}></i>
                  Menarik data...
                </span>
              </div>
            )}
            {/* Tombol tarik data */}
            <button onClick={fetchData} disabled={load} className={`flex items-center gap-2 px-3 sm:px-4 py-2.5 rounded-xl border font-bold text-xs transition-all ${load?'bg-blue-50 border-blue-200 text-blue-600 cursor-not-allowed':'bg-white border-slate-200 text-slate-500 hover:bg-blue-600 hover:border-blue-600 hover:text-white shadow-sm hover:shadow-md hover:shadow-blue-500/20'}`}>
              <i className={`fas fa-sync-alt text-sm ${load?'fa-spin':''}`}></i>
              <span className="hidden sm:inline whitespace-nowrap">{load?'Memuat...':'Tarik Data Presensi'}</span>
            </button>
          </div>
        </header>
        <div className="flex-1 overflow-auto p-4 md:p-5 flex flex-col min-h-0">
          {load&&presensi.length===0&&tab!=='pegawai'
            ? <div className="load-scene">

                {/* ── Background ambient orbs ── */}
                <div className="load-orb1"></div>
                <div className="load-orb2"></div>
                <div className="load-orb3"></div>

                {/* ── Subtle grid texture ── */}
                <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(148,163,184,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.07) 1px,transparent 1px)',backgroundSize:'32px 32px',pointerEvents:'none'}}></div>

                {/* ── Main content ── */}
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'32px',zIndex:10,padding:'0 24px',width:'100%',maxWidth:'480px'}}>

                  {/* Cloud → Komputer */}
                  <div style={{position:'relative',width:'120px',height:'340px'}}>

                    {/* Expanding rings dari cloud */}
                    <div style={{position:'absolute',top:'44px',left:'50%'}}>
                      <div className="ring-expand"></div>
                      <div className="ring-expand-2"></div>
                    </div>

                    {/* Cloud */}
                    <div className="cloud-lg"><i className="fas fa-cloud"></i></div>

                    {/* Connector dashed line */}
                    <div className="connector-line"></div>

                    {/* Data packets */}
                    <div className="df1"></div>
                    <div className="df2"></div>
                    <div className="df3"></div>
                    <div className="df4"></div>

                    {/* Monitor */}
                    <div className="monitor-lg"><i className="fas fa-desktop"></i></div>
                  </div>

                  {/* Teks status */}
                  <div style={{textAlign:'center'}}>
                    <p style={{fontSize:'1.35rem',fontWeight:800,color:'#0f172a',letterSpacing:'-.02em',lineHeight:1.3}}>Menghubungkan ke Server...</p>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'5px',marginTop:'8px'}}>
                      <p style={{fontSize:'.9rem',color:'#64748b',fontWeight:500}}>Sedang sinkronisasi data</p>
                      <span className="blink1" style={{display:'inline-block',width:'7px',height:'7px',borderRadius:'50%',background:'#94a3b8'}}></span>
                      <span className="blink2" style={{display:'inline-block',width:'7px',height:'7px',borderRadius:'50%',background:'#94a3b8'}}></span>
                      <span className="blink3" style={{display:'inline-block',width:'7px',height:'7px',borderRadius:'50%',background:'#94a3b8'}}></span>
                    </div>
                  </div>

                  {/* Shimmer bar */}
                  <div className="shimmer-track" style={{width:'100%'}}>
                    <div className="shimmer-bar"></div>
                  </div>

                  {/* Badge */}
                  <div className="badge-float" style={{display:'flex',alignItems:'center',gap:'8px',background:'linear-gradient(135deg,rgba(239,246,255,.9),rgba(238,242,255,.9))',backdropFilter:'blur(8px)',border:'1px solid rgba(147,197,253,.6)',borderRadius:'14px',padding:'10px 20px',boxShadow:'0 4px 20px rgba(59,130,246,.12),0 1px 4px rgba(0,0,0,.05)'}}>
                    <i className="fa-utility-duo fa-semibold fa-airplay" style={{fontSize:'14px',color:'#3b82f6'}}></i>
                    <span style={{fontSize:'11px',color:'#2563eb',fontWeight:700,letterSpacing:'.8px'}}>MONITORING PRESENSI KORWIL SINE</span>
                  </div>

                </div>
              </div>
            : <div className="w-full flex flex-col flex-1 min-h-0">
                {tab==='dashboard'            && <Dashboard presensiData={enriched} ijinData={ijin} pegawaiData={pegawai} />}
                {tab==='monitoring_presensi'  && <MonitoringPresensi data={enriched} ijinData={ijin} refreshData={fetchData} userRole={user.role} userLembaga={uLembaga} />}
                {tab==='dokumen_ijin'         && <DokumenIjin data={ijin} refreshData={fetchData} userRole={user.role} userLembaga={uLembaga} />}
                {tab==='pengajuan_psw'        && <PengajuanPSW user={user} />}
                {tab==='pegawai'&&canPegawai  && <DatabasePegawai refreshParent={fetchData} userRole={user.role} pegawaiData={pegawai} />}
                {tab==='monitoring_export'    && <MonitoringExport presensiData={enriched} ijinData={ijin} pegawaiData={pegawai} refreshData={fetchData} userRole={user.role} />}
                {tab==='arsip_data'&&canArsip && <ArsipData userRole={user.role} username={user.username} refreshData={fetchData} />}
                {tab==='jadwal_acara'&&canArsip && <div className="flex-1 flex flex-col min-h-0"><JadwalAcara userRole={user.role} username={user.username} pegawaiData={pegawai} refreshData={fetchData} /></div>}
                {tab==='activity'             && <ActivityLog userRole={user.role} />}
              </div>
          }
          {/* Footer */}
          <footer className="mt-6 pt-4 border-t border-slate-200 flex-shrink-0">
            <div className="flex flex-col sm:flex-row items-center justify-between gap-2 text-[10px] text-slate-400">
              <div className="flex items-center gap-2">
                <span className="w-5 h-5 rounded-md bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center flex-shrink-0">
                  <i className="fas fa-fingerprint text-white" style={{fontSize:'8px'}}></i>
                </span>
                <span><strong className="text-slate-500 font-bold">E-Presensi</strong> &mdash; Sistem Monitoring Presensi Digital</span>
              </div>
              <div className="flex items-center gap-3">
                <span className="flex items-center gap-1">
                  <i className="fas fa-school text-slate-300"></i>
                  Korwil Sine &bull; Dinas Pendidikan Kab. Ngawi
                </span>
                <span className="hidden sm:inline text-slate-200">|</span>
                <span className="flex items-center gap-1 font-semibold text-blue-400">
                  <i className="fas fa-code text-blue-300" style={{fontSize:'9px'}}></i>
                  Powered by <strong>YoriAPP</strong>
                </span>
                <span className="text-slate-300">&copy; {new Date().getFullYear()}</span>
              </div>
            </div>
          </footer>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
