  <script>
  // ============================================================
  // ANTI-INSPECT / ANTI-COPY DETERRENT
  // Catatan: ini HANYA mempersulit user awam, BUKAN keamanan asli.
  // Source code tetap terkirim ke browser dan tetap bisa dibaca
  // oleh siapapun yang cukup paham (Network tab, view-source, dll).
  // ============================================================
  (function(){
    // 1. Nonaktifkan klik kanan / context menu
    document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

    // 2. Nonaktifkan drag (mis. drag gambar untuk save)
    document.addEventListener('dragstart', function(e){ e.preventDefault(); });

    // 3. Nonaktifkan shortcut keyboard umum: F12, Ctrl/Cmd+Shift+I/J/C, Ctrl/Cmd+U, Ctrl/Cmd+S
    document.addEventListener('keydown', function(e){
      const k = (e.key || '').toUpperCase();
      const ctrlOrCmd = e.ctrlKey || e.metaKey;
      if (k === 'F12') { e.preventDefault(); return false; }
      if (ctrlOrCmd && e.shiftKey && ['I','J','C'].includes(k)) { e.preventDefault(); return false; }
      if (ctrlOrCmd && (k === 'U' || k === 'S')) { e.preventDefault(); return false; }
    });

    // 4. Deteksi (perkiraan) DevTools terbuka via selisih ukuran window
    //    Tidak 100% akurat (bisa false-positive di HP / multi-monitor),
    //    jadi hanya dipakai untuk peringatan halus di console, tidak mengunci halaman.
    let warned = false;
    setInterval(function(){
      const threshold = 170;
      const open = (window.outerWidth - window.innerWidth > threshold) ||
                   (window.outerHeight - window.innerHeight > threshold);
      if (open && !warned) {
        warned = true;
        console.log('%c⚠ Developer Tools terdeteksi', 'color:#ef4444;font-size:16px;font-weight:bold;');
      } else if (!open) {
        warned = false;
      }
    }, 1000);

    console.log('%c⚠ Peringatan', 'color:#ef4444;font-size:22px;font-weight:bold;');
    console.log('%cAplikasi ini adalah milik Korwil Sine. Penyalinan / modifikasi tanpa izin tidak diperbolehkan.', 'font-size:12px;color:#475569;');
  })();

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;


const lembagaList = [
  "SDN GENDOL 1","SDN GIRIKERTO 1","SDN GIRIKERTO 2","SDN HARGOSARI 1","SDN HARGOSARI 2",
  "SDN JAGIR 1","SDN TULAKAN 4","SDN JAGIR 2","SDN KUNIRAN 3","SDN JAGIR 3","SDN JAGIR 4",
  "SDN KAUMAN 1","SDN KETANGGUNG 1","SDN KUNIRAN 1","SDN KUNIRAN 2","SDN NGRENDENG 2",
  "SDN SINE 1","SDN PANDANSARI","SDN POCOL","SDN SINE 3","SDN SUMBEREJO 1","SDN SUMBERSARI 1",
  "SDN SUMBERSARI 2","SDN TULAKAN 1","SDN TULAKAN 2","SDN TULAKAN 3","SDN TULAKAN 6",
  "SDN WONOSARI 1","SDN WONOSARI 2"
];


const runGoogleScript = async (fn, ...args) => {
  const res = await fetch('/api/gas', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: fn, args })
  });
  if (!res.ok) throw new Error(`Server error: HTTP ${res.status}`);
  const data = await res.json();
  if (data && data.success === false && data.message) {
    throw new Error(data.message);
  }
  return data;
};

const extractFileId = (url) => {
  if (!url) return null;
  let m = url.match(/\/file\/d\/([^\/]+)/); if (m) return m[1];
  m = url.match(/[?&]id=([^&]+)/);         if (m) return m[1];
  m = url.match(/\/d\/([^\/]+)\/preview/); return m ? m[1] : null;
};

const checkLateStatus = (w, jenis) => {
  if (!w || !jenis || jenis.toLowerCase() !== 'datang') return false;
  try {
    const parts = w.split('pukul '); if (parts.length < 2) return false;
    const [hh, mm] = parts[1].trim().split(/[\.\:]/);
    return (parseInt(hh,10)*60 + parseInt(mm,10)) > 420;
  } catch { return false; }
};
const isOutsideRadius = k => k && k.toLowerCase().includes('luar radius');
const isTidakHadir   = k => k && (k.toLowerCase().includes('tidak hadir') || k.toLowerCase().includes('hari libur'));
const normalizeName  = n => n ? n.replace(/[^a-zA-Z0-9]/g,'').toLowerCase() : '';

const parsePresensiDate = w => {
  if (!w) return null;
  const dateParts = w.split('pukul')[0].trim().split(', ')[1];
  if (!dateParts) return null;
  const [day, mon, yr] = dateParts.split(' ');
  const MAP = {Januari:1,Februari:2,Maret:3,April:4,Mei:5,Juni:6,
               Juli:7,Agustus:8,September:9,Oktober:10,November:11,Desember:12};
  const m = MAP[mon]; if (!m) return null;
  return `${day.padStart(2,'0')}/${String(m).padStart(2,'0')}/${yr}`;
};
const dateToNumber = d => {
  if (!d) return null;
  const [dd,mm,yy] = d.split('/').map(Number);
  return (!dd||!mm||!yy) ? null : yy*10000+mm*100+dd;
};
const isDateInRangeNum = (d,s,e) => { const n=dateToNumber(d); return n!==null&&n>=s&&n<=e; };
const parseIjinDate = d => {
  if (!d) return null;
  const [y,m,dd] = d.split('-'); if (!y||!m||!dd) return null;
  return `${dd.padStart(2,'0')}/${m.padStart(2,'0')}/${y}`;
};
const isDateInRange = (d,s,e) => {
  if (!d||!s||!e) return false;
  const n = x => { const [a,b,c]=x.split('/').map(Number); return c*10000+b*100+a; };
  return n(d)>=n(s) && n(d)<=n(e);
};
const enrichPresensiWithIjin = (prs, ijin) => {
  if (!prs||!ijin) return prs;
  const approved = ijin.filter(i=>i.Status&&i.Status.toLowerCase()==='disetujui');
  return prs.map(p => {
    const psw = approved.some(ij => {
      if (normalizeName(p['Nama Pegawai']||'')!==normalizeName(ij['Nama Pegawai']||'')) return false;
      const pd = parsePresensiDate(p['Waktu']); if (!pd) return false;
      const s=parseIjinDate(ij['Tanggal Awal']), e=parseIjinDate(ij['Tanggal Berakir']);
      if (!s||!e) return false;
      return isDateInRange(pd,s,e);
    });
    return psw ? {...p,isPSW:true,displayRadius:'PSW'} : {...p,isPSW:false,displayRadius:p['Keterangan Radius']};
  });
};


const fmtTs = ts => {
  if (!ts) return '-';
  try {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return String(ts);
    return d.toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch { return String(ts); }
};


const TablePagination = ({ currentPage, totalItems, rowsPerPage, onPageChange, onRowsPerPageChange }) => {
  const total = Math.ceil(totalItems/rowsPerPage)||1;
  const [jump, setJump] = useState('');
  const doJump = () => {
    let p = parseInt(jump,10); if(isNaN(p)) p=1;
    p = Math.min(Math.max(1,p),total);
    onPageChange(p); setJump('');
  };
  const btnCls = (dis) => `w-9 h-9 rounded-xl border flex items-center justify-center text-xs transition-all flex-shrink-0 touch-manipulation ${dis?'border-slate-100 bg-slate-50 text-slate-300 cursor-not-allowed':'border-slate-200 bg-white text-slate-500 active:bg-blue-50 active:border-blue-300 active:text-blue-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600'}`;
  return (
    <div className="bg-slate-50 border-t border-slate-100 px-3 py-3">
      {/* Baris atas: Tampilkan baris + info data */}
      <div className="flex items-center justify-between mb-2.5">
        <div className="flex items-center gap-1.5 text-xs text-slate-500">
          <span className="hidden sm:inline">Tampilkan</span>
          <select
            className="border border-slate-200 rounded-lg px-2 py-1.5 bg-white text-xs outline-none focus:ring-2 focus:ring-blue-400 touch-manipulation"
            value={rowsPerPage}
            onChange={e=>{const v=e.target.value==='all'?totalItems:Number(e.target.value);onRowsPerPageChange(v);onPageChange(1);}}>
            {[10,25,50,100].map(n=><option key={n} value={n}>{n}</option>)}
            <option value="all">Semua</option>
          </select>
          <span className="text-slate-400">baris</span>
        </div>
        <div className="text-xs text-slate-500">
          <span className="text-slate-400">Total </span>
          <strong className="text-slate-700 font-bold">{totalItems}</strong>
          <span className="text-slate-400"> data</span>
        </div>
      </div>
      {/* Baris bawah: Navigasi halaman + jump */}
      <div className="flex items-center justify-between gap-2">
        {/* Tombol navigasi */}
        <div className="flex items-center gap-1">
          <button onClick={()=>onPageChange(1)} disabled={currentPage===1} className={btnCls(currentPage===1)} title="Halaman pertama">
            <i className="fas fa-angle-double-left text-[11px]"></i>
          </button>
          <button onClick={()=>onPageChange(currentPage-1)} disabled={currentPage===1} className={btnCls(currentPage===1)} title="Halaman sebelumnya">
            <i className="fas fa-angle-left text-[11px]"></i>
          </button>
          <span className="px-3 py-1.5 bg-blue-600 text-white rounded-xl text-xs font-bold min-w-[60px] text-center flex-shrink-0 select-none">
            {currentPage} / {total}
          </span>
          <button onClick={()=>onPageChange(currentPage+1)} disabled={currentPage>=total} className={btnCls(currentPage>=total)} title="Halaman berikutnya">
            <i className="fas fa-angle-right text-[11px]"></i>
          </button>
          <button onClick={()=>onPageChange(total)} disabled={currentPage>=total} className={btnCls(currentPage>=total)} title="Halaman terakhir">
            <i className="fas fa-angle-double-right text-[11px]"></i>
          </button>
        </div>
        {/* Jump to page */}
        <div className="flex items-center gap-1.5">
          <input
            type="number" min="1" max={total} value={jump}
            onChange={e=>setJump(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&doJump()}
            className="w-12 border border-slate-200 rounded-lg px-1.5 py-1.5 text-xs text-center bg-white outline-none focus:ring-2 focus:ring-blue-400 touch-manipulation"
            placeholder="Hal" />
          <button
            onClick={doJump}
            className="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700 active:bg-blue-800 transition-colors touch-manipulation">
            Go
          </button>
        </div>
      </div>
    </div>
  );
};


/* ── CAPTCHA helper ── */
const genCaptcha = () => {
  const ops = ['+','-','×'];
  const op  = ops[Math.floor(Math.random()*ops.length)];
  let a = Math.floor(Math.random()*9)+1;
  let b = Math.floor(Math.random()*9)+1;
  if(op==='-'&&b>a){const t=a;a=b;b=t;}
  const ans = op==='+'?a+b:op==='-'?a-b:a*b;
  return {q:`${a} ${op} ${b} = ?`, ans};
};

        <i className="fas fa-redo-alt text-sm"></i>

    </div>
    {/* jawaban */}
    <div className="relative mt-2">

                <th className="px-4 py-3.5 font-bold uppercase tracking-wider">Status Radius</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider">Ket. Bukti</th>
                {showAksi && <th className="px-4 py-3.5 font-bold uppercase tracking-wider text-center">Aksi</th>}
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {paged.map((item,i) => {
                const out  = isOutsideRadius(item.displayRadius);
                const late = checkLateStatus(item['Waktu'],item['Jenis Presensi']);
                const th   = isTidakHadir(item.displayRadius);
                const psw  = item.isPSW;
                let rCls = 'hover:bg-slate-50/50';
                if(psw)  rCls='row-psw';
                else if(th)   rCls='row-th';

                      <span className={`mt-1 inline-block text-[9px] px-2 py-0.5 rounded font-black uppercase tracking-wider ${(item['Jenis Presensi']||'').toLowerCase()==='datang'?'bg-blue-100 text-blue-700':'bg-amber-100 text-amber-700'}`}>{item['Jenis Presensi']}</span>

                    <td className="px-4 py-3"><div className="font-bold text-xs">{item['Nama Pegawai']}</div><div className="text-[10px] text-slate-400 mt-0.5">{item['Nip']}</div></td>
                    <td className="px-4 py-3 text-center">
                      <div className="flex justify-center gap-2">
                        {canBukti ? <button onClick={()=>setModalImg(item['Bukti Dukung'])} className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 border border-blue-100 flex items-center justify-center hover:bg-blue-100 transition-colors"><i className="fas fa-image text-xs"></i></button>
                          : <span className="w-8 h-8 rounded-lg bg-slate-50 text-slate-300 border border-slate-100 flex items-center justify-center"><i className="fas fa-lock text-xs"></i></span>}
                        <button onClick={()=>{ const la=normCoord(item.Latitude),lo=normCoord(item.Longitude); if(la&&lo) setModalMap({lat:la,lng:lo}); else Swal.fire('Info','Koordinat tidak tersedia','info'); }} className="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-600 border border-emerald-100 flex items-center justify-center hover:bg-emerald-100 transition-colors"><i className="fas fa-map-marker-alt text-xs"></i></button>
                      </div>
                    </td>
                    <td className="px-4 py-3">
                      <span className={`inline-flex items-center gap-1 px-2 py-1 rounded text-[9px] font-black uppercase tracking-wider ${psw?'bg-green-600 text-white':th?'bg-slate-800 text-white':out?'bg-red-600 text-white':'bg-green-600 text-white'}`}>
                        <i className={`fas ${psw||(!th&&!out)?'fa-check-circle':th?'fa-times-circle':'fa-exclamation-circle'} text-[7px]`}></i>
                        {item.displayRadius}
                      </span>
                      {item['Jarak Absen']&&<div className="text-[10px] mt-1 text-slate-400">{item['Jarak Absen']}</div>}
                    </td>
                    <td className="px-4 py-3 min-w-[140px]">
                      {editingRow===item._rowIndex ? (
                        <div className="flex gap-1">
                          <input className="border border-blue-300 px-2 py-1 rounded-lg text-xs flex-1 focus:ring-2 focus:ring-blue-400 outline-none" value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveKet(item._rowIndex)} autoFocus />
                          <button onClick={()=>saveKet(item._rowIndex)} className="w-7 h-7 bg-green-600 text-white rounded-lg flex items-center justify-center hover:bg-green-700 transition-colors"><i className="fas fa-check text-[10px]"></i></button>
                          <button onClick={()=>setEditingRow(null)} className="w-7 h-7 bg-slate-200 text-slate-600 rounded-lg flex items-center justify-center hover:bg-slate-300 transition-colors"><i className="fas fa-times text-[10px]"></i></button>
                        </div>
                      ) : (
                        <div className={`flex items-center justify-between gap-1 ${isLive?'cursor-pointer group':''}`} onClick={()=>{ if(!isLive) return; setEditingRow(item._rowIndex); setEditVal(item['Keterangan Bukti']||''); }}>
                          <span className="text-xs text-slate-500 truncate max-w-[100px]">{item['Keterangan Bukti']||<span className="italic text-slate-300">-</span>}</span>

                    {showAksi&&(
                      <td className="px-4 py-3 text-center">
                        <div className="flex gap-1.5 justify-center">
                          <button onClick={()=>openEdit(item)} className="w-8 h-8 bg-blue-50 text-blue-600 border border-blue-100 rounded-lg flex items-center justify-center hover:bg-blue-100 transition-colors"><i className="fas fa-edit text-xs"></i></button>
                          <button onClick={()=>delItem(item._rowIndex,item['Nama Pegawai'])} className="w-8 h-8 bg-red-50 text-red-600 border border-red-100 rounded-lg flex items-center justify-center hover:bg-red-100 transition-colors"><i className="fas fa-trash-alt text-xs"></i></button>
                        </div>
                      </td>
                    )}
                  </tr>
                );
              })}
              {paged.length===0&&<tr><td colSpan={showAksi?7:6} className="text-center py-14 text-slate-300"><i className="fas fa-inbox text-4xl block mb-3"></i><span className="text-sm font-medium">Data tidak ditemukan</span></td></tr>}
              {paged.length>0&&Array.from({length:Math.max(0,10-paged.length)}).map((_,i)=>(
                <tr key={`filler-${i}`} className="border-transparent"><td colSpan={showAksi?7:6} className="h-[46px] px-4"></td></tr>
              ))}
            </tbody>
          </table>
        </div>
        <TablePagination currentPage={page} totalItems={total} rowsPerPage={rpp} onPageChange={setPage} onRowsPerPageChange={setRpp} />
      </div>

      {/* Modal Bukti */}
      {modalImg&&<div className="fixed inset-0 z-50 bg-black/75 backdrop-blur-sm flex items-center justify-center" style={{padding:'20px'}} onClick={()=>setModalImg(null)}><div className="relative w-full flex flex-col bg-white rounded-2xl shadow-2xl" style={{maxWidth:'900px',height:'90vh',maxHeight:'90vh'}} onClick={e=>e.stopPropagation()}><div className="flex-shrink-0 px-6 py-4 flex justify-between items-center bg-gradient-to-r from-blue-700 to-blue-800 text-white rounded-t-2xl"><span className="font-bold flex items-center gap-2.5"><i className="fas fa-file-image text-blue-200"></i>Bukti Dukung Presensi</span><button onClick={()=>setModalImg(null)} className="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/20 transition-colors" style={{fontSize:'24px',lineHeight:1}}>&times;</button></div><div className="flex-1 min-h-0 bg-slate-50 rounded-b-2xl overflow-hidden">{modalImg.includes('drive.google.com')?<iframe src={`https://drive.google.com/file/d/${extractFileId(modalImg)}/preview`} className="w-full h-full" allow="autoplay" sandbox="allow-same-origin allow-scripts"></iframe>:<img src={modalImg} alt="Bukti" className="w-full h-full object-contain" onError={e=>{e.target.onerror=null;e.target.parentNode.innerHTML='<div class="flex flex-col items-center justify-center h-full p-8"><i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-4"></i><p class="text-slate-600 font-semibold">Gambar tidak dapat ditampilkan</p></div>';}} />}</div></div></div>}

      {/* Modal Map */}
      {modalMap&&<div className="fixed inset-0 z-50 bg-black/75 backdrop-blur-sm flex items-center justify-center" style={{padding:'20px'}} onClick={()=>setModalMap(null)}><div className="w-full flex flex-col bg-white rounded-2xl shadow-2xl" style={{maxWidth:'780px',height:'82vh',maxHeight:'82vh'}} onClick={e=>e.stopPropagation()}><div className="flex-shrink-0 px-6 py-4 flex justify-between items-center bg-gradient-to-r from-blue-700 to-blue-800 text-white rounded-t-2xl"><span className="font-bold flex items-center gap-2.5"><i className="fas fa-map-marked-alt text-blue-200"></i>Lokasi Presensi</span><button onClick={()=>setModalMap(null)} className="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/20 transition-colors" style={{fontSize:'24px',lineHeight:1}}>&times;</button></div><div className="flex-1 min-h-0 rounded-b-2xl overflow-hidden"><iframe width="100%" height="100%" frameBorder="0" style={{border:0,display:'block'}} src={`https://maps.google.com/maps?q=${modalMap.lat},${modalMap.lng}&z=16&output=embed`} allowFullScreen></iframe></div></div></div>}

      {/* Modal Libur */}
      {showRange&&<div className="fixed inset-0 z-50 bg-black/75 backdrop-blur-sm flex items-center justify-center" style={{padding:'20px'}} onClick={()=>setShowRange(false)}><div className="bg-white rounded-2xl shadow-2xl w-full flex flex-col" style={{maxWidth:'520px',maxHeight:'90vh'}} onClick={e=>e.stopPropagation()}><div className="flex-shrink-0 px-6 py-4 flex justify-between items-center bg-gradient-to-r from-purple-600 to-purple-700 text-white rounded-t-2xl"><span className="font-bold flex items-center gap-2.5"><i className="fas fa-calendar-alt"></i>Atur Libur Manual</span><button onClick={()=>setShowRange(false)} className="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/20 transition-colors" style={{fontSize:'24px',lineHeight:1}}>&times;</button></div><div className="overflow-y-auto flex-1 p-6 space-y-5"><div className="grid grid-cols-2 gap-4"><div><label className={lCls}>Tgl Awal</label><input type="date" className={iCls} value={rStart} onChange={e=>setRStart(e.target.value)} /></div><div><label className={lCls}>Tgl Akhir</label><input type="date" className={iCls} value={rEnd} onChange={e=>setREnd(e.target.value)} /></div></div><div><label className={lCls}>Status</label><select className={iCls} value={rStat} onChange={e=>setRStat(e.target.value)}><option>Libur</option><option>Cuti Bersama</option><option>Izin</option><option>Sakit</option></select></div><div><label className={lCls}>Keterangan (opsional)</label><textarea className={iCls} rows="3" value={rKet} onChange={e=>setRKet(e.target.value)} placeholder="Contoh: Libur Hari Raya"></textarea></div><div className="flex justify-end gap-3 pt-3 border-t border-slate-100"><button onClick={()=>setShowRange(false)} className="px-5 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50">Batal</button><button onClick={async()=>{ if(!rStart||!rEnd){Swal.fire('Peringatan','Tanggal harus diisi','warning');return;} const la=Swal.fire({title:'Memproses...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()}); const r=await runGoogleScript('setStatusRentang',rStart,rEnd,rStat,rKet); la.close(); if(r.success){Swal.fire({icon:'success',title:'Berhasil',text:`${r.updated} data diupdate`});setShowRange(false);refreshData();}else Swal.fire('Error','Gagal','error'); }} className="px-5 py-2.5 bg-purple-600 text-white rounded-xl text-sm font-bold hover:bg-purple-700">Terapkan</button></div></div></div></div>}

      {/* CRUD Modal — dengan dropdown Nama Lembaga & Keterangan Radius */}
      {showCRUD&&<div className="fixed inset-0 z-50 bg-black/75 backdrop-blur-sm flex items-center justify-center" style={{padding:'20px'}} onClick={()=>setShowCRUD(false)}><div className="bg-white rounded-2xl shadow-2xl w-full flex flex-col" style={{maxWidth:'780px',maxHeight:'90vh'}} onClick={e=>e.stopPropagation()}><div className="flex-shrink-0 px-6 py-5 flex justify-between items-center bg-gradient-to-r from-blue-700 to-blue-800 text-white rounded-t-2xl"><span className="font-bold text-base flex items-center gap-2.5"><i className={`fas ${cMode==='add'?'fa-plus-circle':'fa-edit'} text-blue-200`}></i>{cMode==='add'?'Tambah Presensi Baru':'Edit Data Presensi'}</span><button onClick={()=>setShowCRUD(false)} className="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/20 transition-colors" style={{fontSize:'24px',lineHeight:1}}>&times;</button></div><div className="overflow-y-auto flex-1 p-6 space-y-5"><div className="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label className={lCls}>Hari Tanggal</label><input type="text" value={fv['Hari Tanggal']} onChange={e=>setFv({...fv,'Hari Tanggal':e.target.value})} className={iCls} /></div><div><label className={lCls}>Waktu *</label><input type="text" value={fv['Waktu']} onChange={e=>setFv({...fv,'Waktu':e.target.value})} className={iCls} required /></div><div><label className={lCls}>Jenis Presensi *</label><select value={fv['Jenis Presensi']} onChange={e=>setFv({...fv,'Jenis Presensi':e.target.value})} className={iCls} required><option value="">-- Pilih --</option><option>Datang</option><option>Pulang</option></select></div>
              {/* ★ DROPDOWN Nama Lembaga */}
              <div><label className={lCls}>Nama Lembaga</label><select value={fv['Nama Lembaga']} onChange={e=>setFv({...fv,'Nama Lembaga':e.target.value})} className={iCls}><option value="">-- Pilih Lembaga --</option>{lembagaList.map(l=><option key={l} value={l}>{l}</option>)}</select></div>
              <div><label className={lCls}>Nama Pegawai *</label><input type="text" value={fv['Nama Pegawai']} onChange={e=>setFv({...fv,'Nama Pegawai':e.target.value})} className={iCls} required /></div><div><label className={lCls}>NIP</label><input type="text" value={fv['Nip']} onChange={e=>setFv({...fv,'Nip':e.target.value})} className={iCls} /></div><div className="md:col-span-2"><label className={lCls}>Bukti Dukung (URL)</label><input type="text" value={fv['Bukti Dukung']} onChange={e=>setFv({...fv,'Bukti Dukung':e.target.value})} className={iCls} /></div><div><label className={lCls}>Latitude</label><input type="text" value={fv['Latitude']} onChange={e=>setFv({...fv,'Latitude':e.target.value})} className={iCls} /></div><div><label className={lCls}>Longitude</label><input type="text" value={fv['Longitude']} onChange={e=>setFv({...fv,'Longitude':e.target.value})} className={iCls} /></div><div><label className={lCls}>Jarak Absen</label><input type="text" value={fv['Jarak Absen']} onChange={e=>setFv({...fv,'Jarak Absen':e.target.value})} className={iCls} /></div>
              {/* ★ DROPDOWN Keterangan Radius */}
              <div><label className={lCls}>Keterangan Radius</label><select value={fv['Keterangan Radius']} onChange={e=>setFv({...fv,'Keterangan Radius':e.target.value})} className={iCls}><option value="">-- Pilih Status --</option><option value="DI DALAM RADIUS">DI DALAM RADIUS</option><option value="DI LUAR RADIUS">DI LUAR RADIUS</option><option value="Tidak Hadir">Tidak Hadir</option><option value="Hari Libur">Hari Libur</option><option value="Cuti Bersama">Cuti Bersama</option></select></div>
              <div className="md:col-span-2"><label className={lCls}>Keterangan Bukti</label><input type="text" value={fv['Keterangan Bukti']} onChange={e=>setFv({...fv,'Keterangan Bukti':e.target.value})} className={iCls} /></div></div><div className="flex justify-end gap-3 pt-4 border-t border-slate-100"><button onClick={()=>setShowCRUD(false)} className="px-5 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50">Batal</button><button onClick={submitCRUD} className="px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 flex items-center gap-2"><i className="fas fa-save"></i>Simpan</button></div></div></div></div>}
    </div>
  );
};


const DokumenIjin = ({ data, refreshData, userRole, userLembaga }) => {
  const [modalPdf,setModalPdf]=useState(null);
  const [flLem,setFlLem]=useState(''), [flNama,setFlNama]=useState('');
  const [page,setPage]=useState(1), [rpp,setRpp]=useState(10);

  const [statOver,setStatOver]=useState({}); // {rowIndex: newStatus}
  const [savingStat,setSavingStat]=useState(null);
  const [ketEdit,setKetEdit]=useState(null);
  const [ketVals,setKetVals]=useState({});
  const [savingKet,setSavingKet]=useState(null);

  const canEditLem = userRole==='Admin'||userRole==='User'||userRole==='Superuser';
  const canEdit    = userRole==='Admin'||userRole==='User'||userRole==='Superuser';

  useEffect(()=>{ if(!canEditLem&&userLembaga) setFlLem(userLembaga); },[canEditLem,userLembaga]);
  const filtered = useMemo(()=>data.filter(i=>(i['Nama Lembaga']||'').toLowerCase().includes(flLem.toLowerCase())&&(i['Nama Pegawai']||'').toLowerCase().includes(flNama.toLowerCase())),[data,flLem,flNama]);
  useEffect(()=>{ setPage(1); setRpp(10); },[flLem,flNama]);
  const total = filtered.length;
  const eff   = rpp===total?total:rpp;
  const paged = filtered.slice((page-1)*eff, page*eff);

  // Normalisasi status agar case-insensitive match
  const normStat = s => {
    if (!s) return 'Diajukan';
    const l = s.toLowerCase();
    if (l==='disetujui') return 'Disetujui';
    if (l==='ditolak')   return 'Ditolak';
    return 'Diajukan';
  };
  const getDisplayStat = item => statOver[item._rowIndex]!==undefined ? statOver[item._rowIndex] : normStat(item.Status);


  const handleStatClick = async (rowIndex, newStat, currentKet) => {
    setStatOver(p=>({...p,[rowIndex]:newStat})); // optimistic
    setSavingStat(rowIndex);
    try {
      const r = await runGoogleScript('updateDokumenIjin', rowIndex, newStat, currentKet||'');
      if(r&&r.success){
        Swal.fire({icon:'success',title:'Status diperbarui',timer:700,showConfirmButton:false,toast:true,position:'top-end'});
        refreshData();
      } else {
        setStatOver(p=>{const n={...p};delete n[rowIndex];return n;}); // revert
        Swal.fire('Error','Gagal memperbarui status','error');
      }
    } catch { setStatOver(p=>{const n={...p};delete n[rowIndex];return n;}); }
    setSavingStat(null);
  };


  const handleKetSave = async (rowIndex, currentStat) => {
    const newKet = ketVals[rowIndex]!==undefined ? ketVals[rowIndex] : '';
    setSavingKet(rowIndex);
    try {
      const r = await runGoogleScript('updateDokumenIjin', rowIndex, currentStat||'Diajukan', newKet);
      if(r&&r.success){
        Swal.fire({icon:'success',title:'Keterangan disimpan',timer:700,showConfirmButton:false,toast:true,position:'top-end'});
        refreshData();
      } else Swal.fire('Error','Gagal menyimpan keterangan','error');
    } catch {}
    setSavingKet(null); setKetEdit(null);
  };

  const delItem = async (idx,nm) => {
    const c = await Swal.fire({title:'Hapus Dokumen Ijin?',text:`Yakin hapus pengajuan ${nm}?`,icon:'warning',showCancelButton:true,confirmButtonColor:'#d33',cancelButtonColor:'#334155',confirmButtonText:'Ya, Hapus'});
    if(c.isConfirmed){ const r=await runGoogleScript('deleteDokumenIjin',idx); if(r.success){Swal.fire({icon:'success',title:'Terhapus',timer:1200,showConfirmButton:false});refreshData();}else Swal.fire('Error','Gagal','error'); }
  };

  const STATS = ['Diajukan','Disetujui','Ditolak'];
  const statColor = s => s==='Disetujui'?'bg-green-600 text-white border-green-600':s==='Ditolak'?'bg-red-600 text-white border-red-600':'bg-blue-600 text-white border-blue-600';

  return (
    <div className="space-y-4 anim-f flex flex-col flex-1 min-h-0">
      {/* Filter */}
      <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <div className="flex flex-wrap gap-3 items-center">
          <span className="font-bold text-sm text-slate-600 flex items-center gap-2"><i className="fas fa-filter text-blue-400"></i>Filter Dokumen Ijin</span>
          {canEditLem ? (
            <select className="border border-slate-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400 bg-white flex-1 min-w-[160px]" value={flLem} onChange={e=>setFlLem(e.target.value)}>
              <option value="">Semua Lembaga</option>
              {lembagaList.map(l=><option key={l} value={l}>{l}</option>)}
            </select>
          ) : (
            <div className="flex-1 border border-slate-200 px-3 py-2.5 rounded-lg bg-slate-50 text-sm text-slate-500 flex items-center gap-2 min-w-[160px]"><i className="fas fa-lock text-slate-300 text-xs"></i>{userLembaga||flLem}</div>
          )}
          <input type="text" placeholder="Cari Nama Pegawai..." className="border border-slate-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400 flex-1 min-w-[160px]" value={flNama} onChange={e=>setFlNama(e.target.value)} />
        </div>
      </div>

      {/* Info tip */}
      {canEdit&&<div className="bg-blue-50 border border-blue-100 rounded-xl px-4 py-2.5 flex items-center gap-3"><i className="fas fa-info-circle text-blue-400 text-sm"></i><p className="text-xs text-blue-600 font-medium">Klik tombol status untuk menyimpan otomatis. Klik kolom Keterangan lalu tekan Enter atau klik di luar untuk menyimpan.</p></div>}

      {/* Table */}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 flex-1 flex flex-col">
        <div className="overflow-x-auto rounded-t-2xl flex-1">
          <table className="w-full text-sm text-left">
            <thead className="bg-gradient-to-r from-blue-700 to-blue-800 text-white text-xs">
              <tr>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider">Nama Pegawai</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider">Jenis Ijin</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider whitespace-nowrap">Tgl Awal</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider whitespace-nowrap">Tgl Akhir</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider text-center">File</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider min-w-[220px]">Status</th>
                <th className="px-4 py-3.5 font-bold uppercase tracking-wider min-w-[140px]">Keterangan</th>
                {canEdit&&<th className="px-4 py-3.5 font-bold uppercase tracking-wider text-center">Hapus</th>}
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {paged.map((item,i) => {
                const curStat  = getDisplayStat(item);
                const isSaving = savingStat===item._rowIndex;
                const isKEdit  = ketEdit===item._rowIndex;
                const isKSave  = savingKet===item._rowIndex;
                return (
                  <tr key={i} className={`hover:bg-slate-50/50 transition-colors ${isSaving?'opacity-60':''}`}>
                    <td className="px-4 py-3"><div className="font-bold text-xs">{item['Nama Pegawai']}</div><div className="text-[10px] text-slate-400 mt-0.5">{item['Nama Lembaga']}</div></td>
                    <td className="px-4 py-3">
                      <span className={`inline-flex items-center gap-1 px-2 py-1 rounded text-[10px] font-bold ${item['Jenis Ijin']==='Dinas Luar'?'bg-indigo-100 text-indigo-700':item['Jenis Ijin']==='Sakit'?'bg-rose-100 text-rose-700':'bg-amber-100 text-amber-700'}`}>
                        <i className={`fas ${item['Jenis Ijin']==='Sakit'?'fa-heartbeat':item['Jenis Ijin']==='Dinas Luar'?'fa-car':'fa-envelope'} text-[8px]`}></i>
                        {item['Jenis Ijin']}
                      </span>
                    </td>
                    <td className="px-4 py-3 text-xs text-slate-600 whitespace-nowrap">{item['Tanggal Awal']||'-'}</td>
                    <td className="px-4 py-3 text-xs text-slate-600 whitespace-nowrap">{item['Tanggal Berakir']||'-'}</td>
                    <td className="px-4 py-3 text-center"><button onClick={()=>setModalPdf(item['File URL'])} className="inline-flex items-center gap-1 bg-red-600 text-white px-2.5 py-1.5 rounded-lg text-[10px] font-bold hover:bg-red-700 transition-colors shadow-sm"><i className="fas fa-file-pdf"></i>PDF</button></td>

                    {/* ★ Status pills – klik langsung simpan, tanpa tombol Simpan */}
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-1.5 flex-wrap">
                        {STATS.map(s => {
                          const sel = curStat===s;
                          return (
                            <button key={s}
                              onClick={()=>canEdit&&!isSaving&&handleStatClick(item._rowIndex,s,item.Keterangan)}
                              disabled={!canEdit||isSaving}
                              title={`Set: ${s}`}
                              className={`px-2.5 py-1 rounded-full text-[10px] font-bold border transition-all ${sel?statColor(s):'bg-white text-slate-400 border-slate-200 hover:border-slate-300 hover:bg-slate-50'} ${(!canEdit||isSaving)?'cursor-default opacity-60':'cursor-pointer'}`}>
                              {sel&&<i className="fas fa-check mr-1 text-[8px]"></i>}{s}
                            </button>
                          );
                        })}
                        {isSaving&&<i className="fas fa-spinner fa-spin text-xs text-slate-300 ml-1"></i>}
                      </div>
                    </td>

                    {/* ★ Keterangan – klik untuk edit, blur/Enter auto-save */}
                    <td className="px-4 py-3">
                      {isKEdit ? (
                        <div className="flex items-center gap-1">
                          <input type="text" autoFocus
                            className="flex-1 border border-blue-300 px-2 py-1 rounded-lg text-xs focus:ring-2 focus:ring-blue-400 outline-none"
                            value={ketVals[item._rowIndex]!==undefined?ketVals[item._rowIndex]:(item.Keterangan||'')}
                            onChange={e=>setKetVals(p=>({...p,[item._rowIndex]:e.target.value}))}
                            onBlur={()=>handleKetSave(item._rowIndex,curStat)}
                            onKeyDown={e=>{ if(e.key==='Enter') handleKetSave(item._rowIndex,curStat); if(e.key==='Escape') setKetEdit(null); }}
                          />
                          {isKSave&&<i className="fas fa-spinner fa-spin text-xs text-slate-300"></i>}
                        </div>
                      ) : (
                        <div className={`flex items-center gap-1.5 group ${canEdit?'cursor-pointer':'cursor-default'}`}
                          onClick={()=>{ if(!canEdit)return; setKetEdit(item._rowIndex); setKetVals(p=>({...p,[item._rowIndex]:item.Keterangan||''})); }}>
                          <span className="text-xs text-slate-500 italic flex-1">{item.Keterangan||<span className="text-slate-300">Tambah catatan...</span>}</span>
                          {canEdit&&<i className="fas fa-pencil-alt text-slate-200 group-hover:text-blue-400 text-[9px] transition-colors flex-shrink-0"></i>}
                        </div>
                      )}
                    </td>

                    {canEdit&&<td className="px-4 py-3 text-center"><button onClick={()=>delItem(item._rowIndex,item['Nama Pegawai'])} className="w-8 h-8 bg-red-50 text-red-500 border border-red-100 rounded-lg flex items-center justify-center hover:bg-red-100 transition-colors mx-auto"><i className="fas fa-trash-alt text-xs"></i></button></td>}
                  </tr>
                );
              })}
              {paged.length===0&&<tr><td colSpan={canEdit?8:7} className="text-center py-14 text-slate-300"><i className="fas fa-folder-open text-4xl block mb-3"></i><span className="text-sm font-medium">Tidak ada data dokumen ijin</span></td></tr>}
              {paged.length>0&&Array.from({length:Math.max(0,10-paged.length)}).map((_,i)=>(
                <tr key={`filler-${i}`} className="border-transparent"><td colSpan={canEdit?8:7} className="h-[46px] px-4"></td></tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="flex-shrink-0">
          <TablePagination currentPage={page} totalItems={total} rowsPerPage={rpp} onPageChange={setPage} onRowsPerPageChange={setRpp} />
        </div>
      </div>

      {/* Modal PDF */}
      {modalPdf&&<div className="fixed inset-0 z-50 bg-black/75 backdrop-blur-sm flex items-center justify-center" style={{padding:'20px'}} onClick={()=>setModalPdf(null)}><div className="w-full flex flex-col bg-white rounded-2xl shadow-2xl" style={{maxWidth:'960px',height:'92vh',maxHeight:'92vh'}} onClick={e=>e.stopPropagation()}><div className="flex-shrink-0 px-6 py-4 flex justify-between items-center bg-gradient-to-r from-blue-700 to-blue-800 text-white rounded-t-2xl"><span className="font-bold flex items-center gap-2.5"><i className="fas fa-file-pdf text-red-300"></i>Pratinjau Dokumen PSW</span><button onClick={()=>setModalPdf(null)} className="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/20 transition-colors" style={{fontSize:'24px',lineHeight:1}}>&times;</button></div><iframe src={modalPdf.replace('/view','/preview')} className="flex-1 w-full border-none rounded-b-2xl" sandbox="allow-same-origin allow-scripts"></iframe></div></div>}
    </div>
  );
};


const roleBadge = role => {
  const map = {Admin:'bg-red-100 text-red-700 border-red-200',Superuser:'bg-purple-100 text-purple-700 border-purple-200',User:'bg-blue-100 text-blue-700 border-blue-200',Supervisor:'bg-amber-100 text-amber-700 border-amber-200'};
  return map[role]||'bg-slate-100 text-slate-600 border-slate-200';
};

const emptyFd = ()=>({'Username (MP/ID)':'','Password':'','Name Lembaga':'','Name Pegawai':'','Latitude':'','Longitude':'','Radius (m)':'','Role':''});

const DatabasePegawai = ({ refreshParent, userRole, pegawaiData }) => {
  const [data,setData]     = useState(pegawaiData||[]);
  const [savingId,setSavingId]   = useState(null);
  const [flLem,setFlLem]   = useState(''), [flNama,setFlNama] = useState('');
  const [modal,setModal]   = useState(false), [editRow,setEditRow] = useState(null);
  const [fd,setFd]         = useState(emptyFd());
  const [showPw,setShowPw] = useState(false);
  const [page,setPage]     = useState(1), [rpp,setRpp] = useState(10);
  const canM = userRole==='Admin'||userRole==='Superuser';

  // Sinkronisasi ketika parent refresh data
  useEffect(()=>{ setData(pegawaiData||[]); },[pegawaiData]);

  const filtered = useMemo(()=>data.filter(i=>
    (i['Name Lembaga']||'').toLowerCase().includes(flLem.toLowerCase())&&
    (i['Name Pegawai']||'').toLowerCase().includes(flNama.toLowerCase())
  ),[data,flLem,flNama]);
  useEffect(()=>{ setPage(1); setRpp(10); },[flLem,flNama]);
  const total=filtered.length;
  const eff  = rpp===total?total:rpp;
  const paged= filtered.slice((page-1)*eff,page*eff);

  const openMod = item => {
    if(!canM){Swal.fire('Akses Ditolak','Hanya Admin/Superuser','warning');return;}
    if(item){
      setFd({'Username (MP/ID)':item['Username (MP/ID)']||'','Password':item['Password']||'','Name Lembaga':item['Name Lembaga']||'','Name Pegawai':item['Name Pegawai']||'','Latitude':item['Latitude']||'','Longitude':item['Longitude']||'','Radius (m)':item['Radius (m)']||'','Role':item['Role']||''});
      setEditRow(item._rowIndex);
    } else {
      setFd(emptyFd()); setEditRow(null);
    }
    setShowPw(false); setModal(true);
  };

  const save = async () => {
    if(!fd['Username (MP/ID)']||!fd['Password']||!fd['Name Pegawai']){
      Swal.fire('Peringatan','Username, Password, Nama Pegawai wajib diisi.','warning'); return;
    }
    setSavingId(editRow||'new');
    // Optimistic update langsung
    if(editRow) {
      setData(prev=>prev.map(p=>p._rowIndex===editRow?{...p,...fd}:p));
    } else {
      setData(prev=>[{...fd,_rowIndex:'__tmp__'},...prev]);
    }
    setModal(false);
    const r = editRow
      ? await runGoogleScript('updatePegawai',editRow,fd)
      : await runGoogleScript('addPegawai',fd);
    if(r.success){
      Swal.fire({icon:'success',title:editRow?'Data diperbarui!':'Pegawai ditambahkan!',timer:1000,showConfirmButton:false,toast:true,position:'top-end'});
      if(refreshParent) refreshParent();
    } else {
      Swal.fire('Gagal','Data gagal disimpan.','error');
    }
    setSavingId(null);
  };

  const del = async (idx, nm) => {
    if(!canM){Swal.fire('Akses Ditolak','Hanya Admin/Superuser','warning');return;}
    const c = await Swal.fire({title:'Hapus Pegawai?',text:`Yakin hapus "${nm}"?`,icon:'warning',showCancelButton:true,confirmButtonColor:'#d33',cancelButtonColor:'#334155',confirmButtonText:'Ya, Hapus',cancelButtonText:'Batal'});
    if(!c.isConfirmed) return;
    // Optimistic delete
    setData(prev=>prev.filter(p=>p._rowIndex!==idx));
    setSavingId(idx);
    const r = await runGoogleScript('deletePegawai',idx);
    if(r.success){
      Swal.fire({icon:'success',title:'Terhapus!',timer:900,showConfirmButton:false,toast:true,position:'top-end'});
      if(refreshParent) refreshParent();
    } else {
      Swal.fire('Gagal','Gagal menghapus.','error');
      // Rollback: kembalikan data dari parent
      setData(pegawaiData||[]);
    }
    setSavingId(null);
  };

  const iCls = "w-full border border-slate-200 px-3 py-2.5 rounded-xl text-sm focus:ring-2 focus:ring-blue-400 outline-none bg-white transition-shadow";
  const lCls = "block text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-1.5";

  return (
    <div className="space-y-4 anim-f flex flex-col flex-1 min-h-0">
      {/* Header */}
      <div className="bg-white p-4 sm:p-5 rounded-2xl shadow-sm border border-slate-100">
        <div className="flex flex-wrap justify-between items-center gap-3">
          <div>
            <h3 className="font-bold text-base sm:text-lg text-slate-800 flex items-center gap-2">
              <span className="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
                <i className="fas fa-users text-blue-600 text-sm"></i>
              </span>
              Database Pegawai
            </h3>
            <p className="text-xs text-slate-400 mt-0.5 ml-10">{total} pegawai ditemukan</p>
          </div>
          <div className="flex items-center gap-2">
            {canM
              ? <button onClick={()=>openMod()} className="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-4 py-2.5 rounded-xl font-bold text-xs sm:text-sm flex items-center gap-2 shadow-sm transition-all">
                  <i className="fas fa-plus-circle"></i>
                  <span>Tambah Pegawai</span>
                </button>
              : <div className="text-xs text-red-500 bg-red-50 px-3 py-2 rounded-xl border border-red-100 flex items-center gap-2"><i className="fas fa-lock"></i><span className="hidden sm:inline">Hanya Admin/Superuser</span></div>
            }
          </div>
        </div>
      </div>

      {/* Filter */}
      <div className="bg-white p-3 sm:p-4 rounded-2xl shadow-sm border border-slate-100">
        <div className="flex flex-col sm:flex-row gap-2 sm:gap-3">
          <div className="relative flex-1">
            <span className="absolute inset-y-0 left-3 flex items-center text-slate-300 pointer-events-none"><i className="fas fa-school text-xs"></i></span>
            <select className="w-full border border-slate-200 pl-8 pr-3 py-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-400 bg-white" value={flLem} onChange={e=>setFlLem(e.target.value)}>
              <option value="">Semua Lembaga</option>
              {lembagaList.map(l=><option key={l} value={l}>{l}</option>)}
            </select>
          </div>
          <div className="relative flex-1">
            <span className="absolute inset-y-0 left-3 flex items-center text-slate-300 pointer-events-none"><i className="fas fa-search text-xs"></i></span>
            <input type="text" placeholder="Cari nama pegawai…" className="w-full border border-slate-200 pl-8 pr-3 py-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-400" value={flNama} onChange={e=>setFlNama(e.target.value)} />
          </div>
        </div>
      </div>

      {/* Tabel desktop / Card mobile */}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex-1 flex flex-col">

        {/* ── MOBILE: Card list (< md) ── */}
        <div className="block md:hidden divide-y divide-slate-100 flex-1 overflow-y-auto">
          {paged.length===0&&(
            <div className="py-16 text-center text-slate-300">
              <i className="fas fa-users text-4xl block mb-3"></i>
              <span className="text-sm">Tidak ada data pegawai</span>
            </div>
          )}
          {paged.map((item,i)=>(
            <div key={i} className={`p-4 transition-colors ${savingId===item._rowIndex?'bg-blue-50/60 saving-row':'hover:bg-slate-50/60'}`}>
              {/* baris atas: nama + role + aksi */}
              <div className="flex items-start justify-between gap-2 mb-2">
                <div className="flex items-center gap-2.5 min-w-0">
                  <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black text-sm flex-shrink-0">
                    {(item['Name Pegawai']||'?').charAt(0).toUpperCase()}
                  </div>
                  <div className="min-w-0">
                    <p className="font-bold text-sm text-slate-800 truncate">{item['Name Pegawai']||'-'}</p>
                    <p className="text-[11px] text-blue-600 font-medium truncate">{item['Username (MP/ID)']||'-'}</p>
                  </div>
                </div>
                <div className="flex items-center gap-1.5 flex-shrink-0">
                  <span className={`px-2 py-0.5 rounded-lg text-[9px] font-black uppercase border ${roleBadge(item['Role'])}`}>{item['Role']||'-'}</span>
                  {canM&&<>
                    <button onClick={()=>openMod(item)} className="w-8 h-8 bg-blue-50 text-blue-600 border border-blue-100 rounded-lg flex items-center justify-center active:bg-blue-100 transition-colors">
                      <i className="fas fa-edit text-xs"></i>
                    </button>
                    <button onClick={()=>del(item._rowIndex,item['Name Pegawai'])} className="w-8 h-8 bg-red-50 text-red-500 border border-red-100 rounded-lg flex items-center justify-center active:bg-red-100 transition-colors">
                      <i className="fas fa-trash-alt text-xs"></i>
                    </button>
                  </>}
                </div>
              </div>
              {/* baris info */}
              <div className="grid grid-cols-2 gap-x-4 gap-y-1 ml-11">
                <div>
                  <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Lembaga</p>
                  <p className="text-xs text-slate-600 font-medium">{item['Name Lembaga']||'-'}</p>
                </div>
                <div>
                  <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Radius</p>
                  <p className="text-xs text-slate-600">{item['Radius (m)']?`${item['Radius (m)']} m`:'-'}</p>
                </div>
                <div>
                  <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Latitude</p>
                  <p className="text-xs text-slate-500 font-mono">{item['Latitude']||'-'}</p>
                </div>
                <div>
                  <p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Longitude</p>
                  <p className="text-xs text-slate-500 font-mono">{item['Longitude']||'-'}</p>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* ── DESKTOP: Tabel (≥ md) ── */}
        <div className="hidden md:block overflow-x-auto flex-1">
          <table className="w-full text-sm text-left">
            <thead className="bg-gradient-to-r from-blue-700 to-blue-800 text-white text-xs">
              <tr>
                {['#','Nama Pegawai','Username','Lembaga','Koordinat','Radius','Role'].map(h=>(
                  <th key={h} className="px-4 py-3.5 font-bold uppercase tracking-wider whitespace-nowrap">{h}</th>
                ))}
                {canM&&<th className="px-4 py-3.5 font-bold uppercase tracking-wider text-center">Aksi</th>}
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {paged.map((item,i)=>(
                <tr key={i} className={`transition-colors ${savingId===item._rowIndex?'bg-blue-50 saving-row':'hover:bg-slate-50/50'}`}>
                  <td className="px-4 py-3 text-xs text-slate-400 w-8">{(page-1)*eff+i+1}</td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-2.5">
                      <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black text-xs flex-shrink-0">
                        {(item['Name Pegawai']||'?').charAt(0).toUpperCase()}
                      </div>
                      <span className="font-bold text-xs text-slate-800">{item['Name Pegawai']||'-'}</span>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-xs font-medium text-blue-700">{item['Username (MP/ID)']||'-'}</td>
                  <td className="px-4 py-3 text-xs text-slate-600">{item['Name Lembaga']||'-'}</td>
                  <td className="px-4 py-3 text-xs font-mono text-slate-400 whitespace-nowrap">
                    {item['Latitude']&&item['Longitude']?`${item['Latitude']}, ${item['Longitude']}`:'-'}
                  </td>
                  <td className="px-4 py-3 text-xs whitespace-nowrap">{item['Radius (m)']?`${item['Radius (m)']} m`:'-'}</td>
                  <td className="px-4 py-3">
                    <span className={`inline-block px-2 py-0.5 rounded-lg text-[9px] font-black uppercase border ${roleBadge(item['Role'])}`}>{item['Role']||'-'}</span>
                  </td>
                  {canM&&(
                    <td className="px-4 py-3">
                      <div className="flex justify-center gap-1.5">
                        <button onClick={()=>openMod(item)} className="w-8 h-8 bg-blue-50 text-blue-600 border border-blue-100 rounded-lg flex items-center justify-center hover:bg-blue-100 transition-colors" title="Edit">
                          <i className="fas fa-edit text-xs"></i>
                        </button>
                        <button onClick={()=>del(item._rowIndex,item['Name Pegawai'])} className="w-8 h-8 bg-red-50 text-red-500 border border-red-100 rounded-lg flex items-center justify-center hover:bg-red-100 transition-colors" title="Hapus">
                          <i className="fas fa-trash-alt text-xs"></i>
                        </button>
                      </div>
                    </td>
                  )}
                </tr>
              ))}
              {paged.length===0&&(
                <tr><td colSpan={canM?8:7} className="text-center py-14 text-slate-300">
                  <i className="fas fa-users text-4xl block mb-3"></i>
                  <span className="text-sm">Tidak ada data pegawai</span>
                </td></tr>
              )}
            </tbody>
          </table>
        </div>

        <div className="flex-shrink-0">
          <TablePagination currentPage={page} totalItems={total} rowsPerPage={rpp} onPageChange={setPage} onRowsPerPageChange={setRpp} />
        </div>
      </div>

      {/* ── MODAL CRUD ── */}
      {modal&&canM&&(
        <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={()=>setModal(false)}>
          <div className="bg-white w-full sm:rounded-2xl shadow-2xl flex flex-col modal-outer" style={{maxWidth:'700px',maxHeight:'90vh'}} onClick={e=>e.stopPropagation()}>
            {/* Header modal */}
            <div className="flex-shrink-0 px-5 sm:px-6 py-4 sm:py-5 flex justify-between items-center bg-gradient-to-r from-blue-700 to-blue-800 text-white sm:rounded-t-2xl rounded-t-2xl">
              <span className="font-bold text-sm sm:text-base flex items-center gap-2.5">
                <i className={`fas ${editRow?'fa-user-edit':'fa-user-plus'} text-blue-200`}></i>
                {editRow?'Edit Data Pegawai':'Tambah Pegawai Baru'}
              </span>
              <button onClick={()=>setModal(false)} className="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-white/20 transition-colors text-xl font-bold leading-none">&times;</button>
            </div>
            {/* Body modal */}
            <div className="overflow-y-auto flex-1 p-4 sm:p-6 modal-body">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                {/* Nama Pegawai — full width */}
                <div className="sm:col-span-2">
                  <label className={lCls}>Nama Pegawai <span className="text-red-400">*</span></label>
                  <div className="relative">
                    <span className="absolute inset-y-0 left-3 flex items-center text-slate-300 pointer-events-none"><i className="fas fa-user text-xs"></i></span>
                    <input type="text" value={fd['Name Pegawai']} onChange={e=>setFd({...fd,'Name Pegawai':e.target.value})} className={iCls+' pl-9'} placeholder="Masukkan nama lengkap" required />
                  </div>
                </div>
                {/* Username */}
                <div>
                  <label className={lCls}>Username / ID <span className="text-red-400">*</span></label>
                  <div className="relative">
                    <span className="absolute inset-y-0 left-3 flex items-center text-slate-300 pointer-events-none"><i className="fas fa-id-card text-xs"></i></span>
                    <input type="text" value={fd['Username (MP/ID)']} onChange={e=>setFd({...fd,'Username (MP/ID)':e.target.value})} className={iCls+' pl-9'} placeholder="NIP / ID unik" required />
                  </div>
                </div>
                {/* Password */}
                <div>
                  <label className={lCls}>Password <span className="text-red-400">*</span></label>
                  <div className="relative">
                    <span className="absolute inset-y-0 left-3 flex items-center text-slate-300 pointer-events-none"><i className="fas fa-lock text-xs"></i></span>
                    <input type={showPw?'text':'password'} value={fd['Password']} onChange={e=>setFd({...fd,'Password':e.target.value})} className={iCls+' pl-9 pr-10'} placeholder="••••••••" required />
                    <button type="button" onClick={()=>setShowPw(!showPw)} className="absolute inset-y-0 right-3 flex items-center text-slate-300 hover:text-blue-500 transition-colors">
                      <i className={`fas ${showPw?'fa-eye-slash':'fa-eye'} text-xs`}></i>
                    </button>
                  </div>
                </div>
                {/* Lembaga — full width */}
                <div className="sm:col-span-2">
                  <label className={lCls}>Nama Lembaga</label>
                  <div className="relative">
                    <span className="absolute inset-y-0 left-3 flex items-center text-slate-300 pointer-events-none"><i className="fas fa-school text-xs"></i></span>
